  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #F7F5F1;
      --surface:  #FFFFFF;
      --s2:       #F3EFE8;
      --border:   #E5DDD2;
      --bsub:     #EDE8DF;
      --text:     #1C1917;
      --t2:       #57534E;
      --t3:       #A8A29E;

      /* Tier colors */
      --c5:  #C2410C; --c5bg: #FFF7ED; --c5b: #FED7AA; --c5l: #EA580C;
      --c4:  #1D4ED8; --c4bg: #EFF6FF; --c4b: #BFDBFE; --c4l: #3B82F6;
      --c3:  #B45309; --c3bg: #FFFBEB; --c3b: #FDE68A; --c3l: #D97706;
      --c2:  #6B7280; --c2bg: #F9FAFB; --c2b: #D1D5DB; --c2l: #9CA3AF;
      --c1:  #B91C1C; --c1bg: #FFF5F5; --c1b: #FECACA; --c1l: #EF4444;
      --c0:  #71717A; --c0bg: #F4F4F5; --c0b: #D4D4D8; --c0l: #A1A1AA;

      /* Action badges */
      --new:     #15803D; --new-bg:     #DCFCE7;
      --closed:  #DC2626; --closed-bg:  #FEE2E2;
      --upsized: #1D4ED8; --upsized-bg: #DBEAFE;
      --trimmed: #D97706; --trimmed-bg: #FEF3C7;
      --hold:    #57534E; --hold-bg:    #F3F4F6;

      --acc: #D97040;

      --r: 10px; --rsm: 6px;
      --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────── */
    .hdr {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 24px;
      height: 50px;
      flex-shrink: 0;
      z-index: 10;
    }

    .logo {
      display: flex; align-items: center; gap: 7px;
      font-weight: 600; font-size: 14px; letter-spacing: -0.01em;
      white-space: nowrap;
    }

    .logo-mark {
      width: 20px; height: 20px;
      background: #D97040;
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .logo-mark svg { width: 10px; height: 10px; }

    .nav { display: flex; gap: 2px; }

    .nav-btn {
      padding: 4px 11px; border-radius: var(--rsm);
      border: none; background: transparent;
      color: var(--t2); font-size: 12px; font-weight: 500;
      cursor: pointer; font-family: inherit; transition: all 0.12s;
      white-space: nowrap;
    }
    .nav-btn:hover { background: var(--s2); color: var(--text); }
    .nav-btn.on { background: #FDF4EE; color: #D97040; }

    .hdr-right {
      margin-left: auto; display: flex; align-items: center; gap: 8px;
    }

    .live-dot {
      width: 6px; height: 6px; border-radius: 50%; background: #16A34A;
    }

    .hdr-meta { font-size: 11px; color: var(--t3); white-space: nowrap; }

    /* ── Subheader: Basket bar + Filters ─ */
    .subhdr {
      background: var(--surface);
      border-bottom: 1px solid var(--bsub);
      padding: 10px 20px;
      flex-shrink: 0;
    }

    .basket-bar {
      display: flex; height: 5px; border-radius: 3px; overflow: hidden;
      margin-bottom: 8px; gap: 2px;
    }

    .basket-seg {
      height: 100%; border-radius: 2px;
      transition: flex 0.3s;
    }

    .basket-legend {
      display: flex; flex-wrap: wrap; gap: 4px 14px;
      margin-bottom: 10px;
    }

    .bl-item {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; color: var(--t2); cursor: default;
    }

    .bl-pip {
      width: 7px; height: 7px; border-radius: 2px; flex-shrink: 0;
    }

    .bl-name { }

    .bl-pct {
      font-weight: 600; color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .filters {
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    }

    .filter-input, .filter-select {
      border: 1px solid var(--border);
      border-radius: var(--rsm);
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      padding: 5px 10px;
      outline: none;
      transition: border-color 0.15s;
    }

    .filter-input { width: 160px; }
    .filter-input:focus, .filter-select:focus { border-color: #D97040; }

    .filter-clear {
      padding: 5px 10px; border-radius: var(--rsm);
      border: 1px solid var(--border); background: transparent;
      color: var(--t3); font-size: 11px; font-family: inherit;
      cursor: pointer; transition: all 0.12s;
    }
    .filter-clear:hover { color: var(--text); border-color: var(--t2); }

    .filter-count {
      font-size: 11px; color: var(--t3); margin-left: auto;
    }

    /* ── Main split layout ───────────────── */
    .workspace {
      display: flex; flex: 1; overflow: hidden;
    }

    /* ── Ticker list ─────────────────────── */
    .list-panel {
      flex: 1;
      overflow-y: auto;
      border-right: 1px solid var(--border);
      transition: flex 0.25s ease;
    }

    .list-panel.narrow { flex: 0 0 42%; }

    /* ── Tier section ────────────────────── */
    .tier-head {
      padding: 7px 16px 5px;
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      position: sticky; top: 0; z-index: 2;
      border-bottom: 1px solid;
      display: flex; align-items: center; gap: 8px;
    }

    .tier-head-count {
      font-size: 9px; opacity: 0.6; font-weight: 500;
    }

    /* ── Ticker row ──────────────────────── */
    .ticker-row {
      display: flex; align-items: center;
      padding: 10px 16px; gap: 10px;
      border-bottom: 1px solid var(--bsub);
      cursor: pointer; transition: background 0.1s;
      position: relative;
    }

    .ticker-row:hover { background: #FAFAF7; }
    .ticker-row.selected { background: #FDF4EE; }

    .row-rank {
      font-size: 10px; color: var(--t3);
      min-width: 18px; text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .row-bar {
      width: 3px; border-radius: 2px;
      height: 32px; flex-shrink: 0;
    }

    .narrow .row-bar { height: 26px; }

    .row-main { flex: 1; min-width: 0; }

    .row-sym {
      font-weight: 700; font-size: 13px;
      letter-spacing: 0.02em;
    }

    .narrow .row-sym { font-size: 12px; }

    .row-info {
      display: flex; align-items: center; gap: 6px; margin-top: 2px;
      flex-wrap: wrap;
    }

    .narrow .row-info { display: none; }

    .row-snippet {
      font-size: 11px; color: var(--t3);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      max-width: 400px;
    }

    .narrow .row-snippet { display: none; }

    .row-right {
      display: flex; flex-direction: column;
      align-items: flex-end; gap: 3px; flex-shrink: 0;
    }

    .row-weight {
      display: flex; align-items: center; gap: 5px;
    }

    .row-wnum {
      font-size: 11px; font-weight: 500;
      font-variant-numeric: tabular-nums;
      color: var(--t2); min-width: 30px; text-align: right;
    }

    .row-wbar-bg {
      width: 36px; height: 3px; background: var(--bsub);
      border-radius: 2px;
    }

    .narrow .row-wbar-bg { display: none; }

    .row-wbar-fill {
      height: 3px; border-radius: 2px; background: #D97040;
    }

    .row-date {
      font-size: 10px; color: var(--t3);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .row-price {
      display: flex; align-items: center; gap: 4px;
    }
    .row-price-num {
      font-size: 11px; font-weight: 600;
      font-variant-numeric: tabular-nums; color: var(--text);
    }
    .row-price-chg {
      font-size: 10px; font-weight: 500;
      font-variant-numeric: tabular-nums;
    }
    .price-up { color: #16A34A; }
    .price-dn { color: #DC2626; }
    .row-price-day { opacity: 0.65; }  /* day % fallback — dimmer than open P&L */

    /* ── Tags ────────────────────────────── */
    .tag {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 1px 6px; border-radius: 3px;
      font-size: 10px; font-weight: 500; white-space: nowrap;
    }

    .tag-pip { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }

    .badge {
      display: inline-flex; align-items: center;
      padding: 1px 7px; border-radius: 20px;
      font-size: 10px; font-weight: 600; white-space: nowrap;
    }
    .badge-new     { background: var(--new-bg);     color: var(--new);     }
    .badge-closed  { background: var(--closed-bg);  color: var(--closed);  }
    .badge-upsized { background: var(--upsized-bg); color: var(--upsized); }
    .badge-trimmed { background: var(--trimmed-bg); color: var(--trimmed); }
    .badge-hold    { background: var(--hold-bg);    color: var(--hold);    }

    /* ── Detail panel ────────────────────── */
    .detail-panel {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: none;
    }

    .detail-panel.open { display: block; }

    .detail-close {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: var(--rsm);
      border: 1px solid var(--border); background: transparent;
      color: var(--t3); font-size: 11px; font-family: inherit;
      cursor: pointer; margin-bottom: 18px;
      transition: all 0.12s;
    }
    .detail-close:hover { color: var(--text); border-color: var(--t2); }
    .close-label-mobile { display: none; }
    .detail-date-mobile { display: none; }

    /* Graddox note toggle — desktop hidden, mobile shown */
    .gx-note-toggle {
      display: none;
      align-items: center; justify-content: center;
      width: 24px; height: 24px; flex-shrink: 0;
      border-radius: 4px; border: 1px solid var(--border);
      background: transparent; color: var(--t3);
      font-size: 10px; cursor: pointer; font-family: inherit;
    }

    .detail-hdr {
      display: flex; align-items: flex-start; gap: 12px; margin-bottom: 16px;
      justify-content: space-between;
    }

    .detail-vbar {
      width: 4px; border-radius: 2px;
      height: 52px; flex-shrink: 0; margin-top: 2px;
    }

    .detail-sym {
      font-size: 26px; font-weight: 700;
      letter-spacing: 0.02em; line-height: 1;
    }

    .detail-name {
      font-size: 12px; color: var(--t3); margin-top: 4px;
    }

    .detail-badges {
      display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px;
    }

    .detail-meta-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px; margin-bottom: 16px;
    }

    .meta-item { }

    .meta-label {
      font-size: 9px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--t3); margin-bottom: 3px;
    }

    .meta-value {
      font-size: 13px; font-weight: 500; color: var(--text);
    }

    /* Conviction meter */
    .conv-meter { margin-bottom: 16px; }

    .conv-label {
      font-size: 9px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--t3); margin-bottom: 6px;
    }

    .conv-segs {
      display: flex; gap: 3px; margin-bottom: 4px;
    }

    .conv-seg {
      flex: 1; height: 5px; border-radius: 3px;
      background: var(--bsub);
    }

    .conv-sub {
      display: flex; justify-content: space-between;
      font-size: 9px; color: var(--t3);
    }

    /* Summary block */
    .summary-block {
      border-radius: var(--rsm);
      padding: 12px 14px;
      font-size: 12px; line-height: 1.7; color: var(--t2);
      margin-bottom: 16px; border: 1px solid;
    }

    /* Bullets */
    .bullets-label {
      font-size: 9px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--t3); margin-bottom: 10px;
    }

    .bullets { display: flex; flex-direction: column; gap: 6px; }

    .bullet-item {
      display: flex; gap: 8px; align-items: flex-start;
      padding: 8px 10px; border-radius: var(--rsm);
      background: var(--s2); border: 1px solid var(--bsub);
    }

    .bullet-icon {
      font-size: 8px; margin-top: 3px; flex-shrink: 0;
    }

    .bullet-text { font-size: 12px; color: var(--t2); line-height: 1.6; }

    /* ── Inline edit form ───────────────── */
    .edit-btn {
      display: inline-flex; align-items: center; gap: 4px;
      margin-left: auto; padding: 4px 10px;
      border-radius: var(--rsm); border: 1px solid var(--border);
      background: transparent; color: var(--t3);
      font-size: 11px; font-family: inherit; cursor: pointer;
      transition: all 0.12s;
    }
    .edit-btn:hover { color: var(--text); border-color: var(--t2); }
    .edit-btn.active { color: var(--acc); border-color: var(--acc); background: rgba(99,102,241,0.06); }

    .edit-form {
      background: var(--s2); border: 1px solid var(--border);
      border-radius: var(--r); padding: 14px 16px; margin-bottom: 16px;
    }
    .edit-form-title {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--t3); margin-bottom: 12px;
    }
    .edit-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px;
    }
    .edit-row { display: flex; flex-direction: column; gap: 4px; }
    .edit-row.full { grid-column: 1 / -1; }
    .edit-label {
      font-size: 9px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--t3);
    }
    .edit-input, .edit-select {
      padding: 6px 8px; border-radius: var(--rsm);
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text); font-size: 12px; font-family: inherit;
      transition: border-color 0.12s;
    }
    .edit-input:focus, .edit-select:focus {
      outline: none; border-color: var(--acc);
    }
    .edit-actions { display: flex; gap: 8px; }
    .edit-save {
      padding: 6px 14px; border-radius: var(--rsm);
      background: var(--acc); border: none;
      color: #fff; font-size: 12px; font-weight: 600;
      font-family: inherit; cursor: pointer;
    }
    .edit-save:hover { opacity: 0.88; }
    .edit-cancel {
      padding: 6px 12px; border-radius: var(--rsm);
      border: 1px solid var(--border); background: transparent;
      color: var(--t3); font-size: 12px; font-family: inherit; cursor: pointer;
    }
    .edit-cancel:hover { color: var(--text); }
    .edit-clear {
      margin-left: auto; padding: 6px 12px; border-radius: var(--rsm);
      border: 1px solid var(--border); background: transparent;
      color: var(--t3); font-size: 11px; font-family: inherit; cursor: pointer;
    }
    .edit-clear:hover { color: #DC2626; border-color: #DC2626; }

    .override-dot {
      display: inline-block; width: 5px; height: 5px;
      border-radius: 50%; background: var(--acc);
      margin-left: 4px; vertical-align: middle; flex-shrink: 0;
    }

    /* ── Gradoxx placeholder ─────────────── */
    .placeholder {
      padding: 80px 24px; text-align: center;
      color: var(--t3);
    }
    .placeholder h2 { font-size: 15px; font-weight: 600; color: var(--text); margin: 12px 0 6px; }
    .placeholder p { font-size: 13px; line-height: 1.6; max-width: 300px; margin: 0 auto; }

    .module { display: none; }
    .module.on {
      display: flex; flex-direction: column; flex: 1; overflow: hidden;
    }

    /* Empty state */
    .empty {
      padding: 48px 20px; text-align: center;
      color: var(--t3); font-size: 13px;
    }

    /* ── Graddox Module ──────────────────────── */
    .gx-subhdr {
      background: var(--surface);
      border-bottom: 1px solid var(--bsub);
      padding: 9px 20px;
      flex-shrink: 0;
      display: flex; align-items: center;
      gap: 10px; flex-wrap: wrap;
    }
    .gx-date { font-size: 12px; font-weight: 600; color: var(--text); }
    .gx-bias {
      font-size: 11px; font-weight: 600;
      padding: 2px 8px; border-radius: 4px;
      letter-spacing: 0.02em; flex-shrink: 0;
    }
    .gx-bias.bullish   { background:#DCFCE7; color:#15803D; }
    .gx-bias.bearish   { background:#FEE2E2; color:#DC2626; }
    .gx-bias.flat-down { background:#FEF3C7; color:#B45309; }
    .gx-bias.flat      { background:var(--s2); color:var(--t2); }
    .gx-bias-note { font-size: 11px; color: var(--t2); }
    .gx-upd { margin-left:auto; font-size:11px; color:var(--t3); white-space:nowrap; }

    .gx-body {
      display: flex; flex: 1; overflow: hidden;
    }
    .gx-left {
      flex: 0 0 300px; overflow-y: auto;
      padding: 14px; display: flex;
      flex-direction: column; gap: 10px;
    }
    .gx-right {
      flex: 1; overflow-y: auto;
      padding: 14px; display: flex;
      flex-direction: column; gap: 10px;
    }

    .gx-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .gx-card-hdr {
      padding: 8px 13px;
      background: var(--s2); border-bottom: 1px solid var(--bsub);
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.09em; color: var(--t2);
    }
    .gx-level-row {
      display: flex; align-items: center;
      padding: 8px 13px; gap: 9px;
      border-bottom: 1px solid var(--bsub);
    }
    .gx-level-row:last-child { border-bottom-color: transparent; }
    .gx-lvl-icon  { font-size: 12px; flex-shrink: 0; width: 16px; text-align: center; }
    .gx-lvl-price {
      font-size: 14px; font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.01em; min-width: 46px;
    }
    .gx-lvl-label { font-size: 11px; color: var(--t2); flex: 1; line-height: 1.35; }
    .gx-lvl-badge {
      font-size: 10px; font-weight: 600;
      padding: 2px 6px; border-radius: 3px; white-space: nowrap;
    }

    /* Signal table */
    .gx-sig-wrap { overflow-x: auto; padding-bottom: 9px; }
    .gx-sig-table {
      width: 100%; border-collapse: collapse;
      font-size: 11px; min-width: 480px;
    }
    .gx-sig-table th {
      text-align: left; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--t3); background: var(--s2);
      padding: 7px 13px; border-bottom: 1px solid var(--bsub);
    }
    .gx-sig-table td {
      padding: 9px 13px;
      border-bottom: 1px solid var(--bsub);
      vertical-align: top; line-height: 1.4;
    }
    .gx-sig-table tr:last-child td { border-bottom: none; }
    .gx-sig-trade { font-weight: 700; font-size: 12px; }
    .gx-sig-logic { font-size: 11px; color: var(--t2); }
    .gx-verdict {
      display: flex; align-items: center; gap: 4px;
      font-size: 10px; font-weight: 600; white-space: nowrap;
    }
    .gx-vdot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .gx-note-row td {
      background: var(--s2); font-size: 10px;
      color: var(--t3); padding: 5px 13px;
      border-bottom: none; border-top: 1px solid var(--bsub);
    }

    /* Day log */
    .gx-log-item {
      display: flex; gap: 12px;
      padding: 9px 13px; border-bottom: 1px solid var(--bsub);
    }
    .gx-log-item:last-child { border-bottom-color: transparent; }
    .gx-log-time {
      font-size: 10px; font-weight: 600; color: var(--t3);
      white-space: nowrap; min-width: 54px;
      padding-top: 2px; font-variant-numeric: tabular-nums;
    }
    .gx-log-text { font-size: 12px; color: var(--text); line-height: 1.5; }

    /* Timeframe buttons */
    .tf-btn {
      padding: 2px 7px; border-radius: 4px;
      border: 1px solid var(--border); background: transparent;
      color: var(--t2); font-size: 10px; font-weight: 600;
      font-family: inherit; cursor: pointer; transition: all 0.1s;
    }
    .tf-btn:hover { border-color: var(--t2); color: var(--text); }
    .tf-btn.on { background: #FDF4EE; color: #D97040; border-color: #D97040; }

    /* ══════════════════════════════════════════
       TABLET — 769px–1024px
    ══════════════════════════════════════════ */
    @media (max-width: 1024px) {
      /* Give detail panel more breathing room; list panel narrows accordingly */
      .list-panel.narrow { flex: 0 0 35%; }

      /* Graddox sidebar: shrink fixed width so right column has more chart space */
      .gx-left { flex: 0 0 260px; }
    }

    /* ══════════════════════════════════════════
       MOBILE — ≤768px
    ══════════════════════════════════════════ */
    @media (max-width: 768px) {

      /* ── Header: logo + controls row 1, nav full-width row 2 ── */
      .hdr {
        flex-wrap: wrap;
        height: auto;
        padding: 10px 14px 8px;
        gap: 0;
      }
      .logo      { order: 1; }
      .hdr-right { order: 2; margin-left: auto; }
      .hdr-meta  { display: none; }
      .nav {
        order: 3;
        flex: 0 0 100%;
        margin-top: 8px;
        gap: 4px;
      }
      .nav-btn {
        flex: 1;
        text-align: center;
        padding: 9px 6px;
        font-size: 12px;
        min-height: 40px;
      }

      /* ── Subheader: collapse legend, horizontal-scroll filters ── */
      .subhdr { padding: 8px 12px 10px; }

      /* Hide the text legend — the colour bar is enough on mobile */
      .basket-legend { display: none; }

      /* Filters: single horizontal scrollable strip */
      .filters {
        display: flex;
        flex-wrap: nowrap;
        overflow-x: auto;
        gap: 6px;
        padding-bottom: 2px;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .filters::-webkit-scrollbar { display: none; }
      .filter-input  { flex-shrink: 0; width: 148px; min-height: 38px; font-size: 13px; }
      .filter-select { flex-shrink: 0; min-width: 130px; min-height: 38px; font-size: 12px; }
      .filter-clear  { flex-shrink: 0; min-height: 38px; white-space: nowrap; }
      .filter-count  { flex-shrink: 0; white-space: nowrap; align-self: center; margin-left: 0; }

      /* ── Ticker rows: 2-line vertical card ── */
      .ticker-row {
        flex-wrap: wrap;
        padding: 11px 14px;
        gap: 0;
        align-items: flex-start;
        min-height: 66px;
      }

      /* Rank: vertically centred in the card */
      .row-rank { align-self: center; padding-right: 6px; min-width: 22px; }

      /* Bar: stretch full card height */
      .row-bar  { align-self: stretch; height: auto; min-height: 44px; margin-right: 8px; }

      /* Main (line 1): ticker symbol + basket tag */
      .row-main { flex: 1; min-width: 0; }
      .row-sym  { font-size: 15px; font-weight: 800; letter-spacing: 0.02em; }

      /* Always show basket tag; always hide snippet */
      .row-info                { display: flex !important; margin-top: 3px; }
      .row-snippet             { display: none  !important; }
      .narrow .row-info        { display: flex !important; }
      .narrow .row-snippet     { display: none  !important; }
      .narrow .row-wbar-bg     { display: none; }
      .narrow .row-sym         { font-size: 15px; }

      /* Row-right: pushed to a SECOND LINE, full card width */
      .row-right {
        flex: 0 0 100%;
        flex-direction: row;
        justify-content: space-between;
        align-items: center;
        padding-left: 38px;   /* indent to align with ticker text */
        margin-top: 7px;
        gap: 6px;
      }

      /* Second line: price left · date centre · weight right */
      .row-price   { order: 1; }
      .row-date    { order: 2; font-size: 10px; }
      .row-weight  { order: 3; }
      .row-price-num { font-size: 13px; font-weight: 700; }
      .row-price-chg { font-size: 11px; }
      .row-wnum      { font-size: 12px; font-weight: 600; color: var(--text); }
      .row-wbar-bg   { display: none; }   /* no mini-bar needed on second line */

      /* ── Detail panel: fixed full-screen overlay ── */
      .list-panel.narrow { flex: 1; }

      .detail-panel {
        position: fixed;
        inset: 0;
        z-index: 50;
        background: var(--bg);
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        padding: 0 16px 32px;
      }

      /* Sticky back bar */
      .detail-close {
        position: sticky;
        top: 0;
        z-index: 1;
        width: calc(100% + 32px);
        margin-left: -16px;
        padding: 14px 16px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        border-left: none; border-right: none; border-top: none;
        border-radius: 0;
        font-size: 13px;
        min-height: 48px;
        margin-bottom: 20px;
        display: flex;
        align-items: center;
      }

      /* ── Detail 3-col card: stack vertically ── */
      .data-card-cols { flex-direction: column !important; }
      .data-card-cols > div {
        border-left: none !important;
        padding-left: 0 !important;
        min-width: auto !important;

  document.getElementById('auth-box').innerHTML = `

// ── Auth state listener ───────────────────────────────────
db.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_IN' || event === 'INITIAL_SESSION') {
    if (!session) return;
    const email = session.user.email;
    if (AUTHORIZED_EMAILS.includes(email)) {
      document.getElementById('auth-gate').style.display = 'none';
      document.getElementById('signout-btn').style.display = 'inline-block';
      if (!window._dashboardLoaded) {
        window._dashboardLoaded = true;
        init();
      }
    } else {
      showUnauthorized(email);
    }
  } else if (event === 'SIGNED_OUT') {
    window._dashboardLoaded = false;
    document.getElementById('auth-gate').style.display = 'flex';
    document.getElementById('signout-btn').style.display = 'none';
    showAuthBox();
  }
});

async function dbFetch() {
  const [{ data: holdings, error: hErr }, { data: gx }] = await Promise.all([
    db.from('holdings').select('*').order('rank'),
    db.from('graddox').select('*').eq('id', 1).maybeSingle()
  ]);
  if (hErr) throw hErr;
  const last_updated = holdings.reduce((m, h) => h.updated_at > m ? h.updated_at : m, '');
  window.STW_DATA = { last_updated, holdings };
  if (gx) window.GRADDOX_DATA = gx;
}

async function dbSave(ticker, updates) {
  const { error } = await db.from('holdings').upsert(
    { ticker, ...updates, updated_at: new Date().toISOString() },
    { onConflict: 'ticker' }
  );
  if (error) throw error;
}

};

function bColor(b) { return BASKET_COLORS[b] || "#A8A29E"; }

// ── State ────────────────────────────────────────────────
let selectedTicker = null;
let filteredHoldings = [];
let _sortMode   = 'conviction';
let _priceCache = {};  // { TICKER: { c, pc, dp, h, l, o } } from Finnhub /quote
let _ibkrCache  = {};  // { TICKER: { legs, pnlPct, ts } } — ts: Date.now() when fetched
let _ibkrLive   = false;  // true only during current session's successful fetch

// ── IBKR localStorage helpers ────────────────────────────
function _saveIBKRCache() {
  try { localStorage.setItem('ibkrCache', JSON.stringify(_ibkrCache)); } catch(e) {}
}
function _loadIBKRCache() {
  try {
    const raw = localStorage.getItem('ibkrCache');
    if (raw) _ibkrCache = JSON.parse(raw);
  } catch(e) {}
}
function _ibkrCacheDateStr(ticker) {
  const ts = _ibkrCache[ticker]?.ts;
  if (!ts) return null;
  const d   = new Date(ts);
  const now = new Date();
  const isToday = d.toDateString() === now.toDateString();
  if (isToday) return d.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit', ...ET});
  return d.toLocaleDateString('en-US', {month:'short', day:'numeric', ...ET});
}

// ── Helpers ──────────────────────────────────────────────
function fmtDate(s) {
  if (!s) return '–';
  const d = new Date(s + 'T12:00:00');
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'2-digit' });
}

const ET = { timeZone: 'America/New_York' };

function fmtUpdated(s) {
  if (!s) return '–';
  const d = new Date(s);
  return 'Updated ' + d.toLocaleDateString('en-US',{month:'short',day:'numeric',...ET})
    + ' · ' + d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',...ET})
    + ' EST';
}

function basketTag(name) {
  const c = bColor(name);
  return `<span class="tag" style="background:${c}18;color:${c};border:1px solid ${c}28">
    <span class="tag-pip" style="background:${c}"></span>${name}
  </span>`;
}

function actionBadge(a) {
  if (!a) return '';
  const k = a.toLowerCase();
  const cls = ['new','closed','upsized','trimmed','hold'].includes(k) ? `badge-${k}` : 'badge-hold';
  return `<span class="badge ${cls}">${a}</span>`;
}

// ── Position type detection ──────────────────────────────

  const d = h.position_detail || '';
  if (!d || h.ticker === 'CASH') return null;
  const hasShares  = /Common\s*@/i.test(d);
  const hasOptions = /\$[\d.]+[CP]\b|\b(options\s+only)\b|\d+[CP]\s+[@$]/i.test(d);
  if (hasShares && hasOptions) return 'mixed';
  if (hasOptions) return 'options';
  if (hasShares)  return 'shares';
  return null;
}

// Parse shares cost basis from position_detail e.g. "Common @ $86.14"
function parseCostBasis(h) {
  const m = (h.position_detail||'').match(/Common\s*@\s*\$([0-9]+\.?[0-9]*)/i);
  return m ? parseFloat(m[1]) : null;
}

// ── Basket bar + legend ──────────────────────────────────
function renderBasketBar() {
  const data = window.STW_DATA;
  if (!data) return;
  const map = {};
  data.holdings.forEach(h => {
    const w = h.current_weight ?? h.initial_weight ?? 0;
    map[h.basket] = (map[h.basket]||0) + w;
  });
  const total = Object.values(map).reduce((s,v)=>s+v, 0);
  const entries = Object.entries(map).sort((a,b)=>b[1]-a[1]);

  // Bar segments
  document.getElementById('basket-bar').innerHTML = entries.map(([name, w]) => {
    const c = bColor(name);
    return `<div class="basket-seg" style="flex:${w};background:${c};opacity:0.85"></div>`;
  }).join('');

  // Legend
  document.getElementById('basket-legend').innerHTML = entries.map(([name, w]) => {
    const pct = (w/total*100).toFixed(0);
    const c = bColor(name);
    return `<div class="bl-item">
      <div class="bl-pip" style="background:${c}"></div>
      <span class="bl-name">${name}</span>
      <span class="bl-pct">${pct}%</span>
    </div>`;
  }).join('');
}

// ── Populate basket filter ───────────────────────────────
function populateFilters() {
  const data = window.STW_DATA;
  if (!data) return;
  const baskets = [...new Set(data.holdings.map(h=>h.basket))].sort();
  const sel = document.getElementById('f-basket');
  baskets.forEach(b => {
    const opt = document.createElement('option');
    opt.value = b; opt.textContent = b;
    sel.appendChild(opt);
  });
}

// ── Apply filters ────────────────────────────────────────
function applyFilters() {
  const data = window.STW_DATA;
  if (!data) return;

  const search = document.getElementById('f-search').value.toLowerCase();
  const basket = document.getElementById('f-basket').value;
  const tier   = document.getElementById('f-tier').value;
  const status = document.getElementById('f-status').value;
  const type   = document.getElementById('f-type').value;
  const hasFilter = search || basket || tier || status || type;

  document.getElementById('f-clear').style.display = hasFilter ? 'block' : 'none';

  filteredHoldings = data.holdings.filter(h => {
    if (basket && h.basket !== basket) return false;
    if (tier   && h.conviction !== Number(tier)) return false;
    if (status && h.last_action !== status) return false;
    if (type   && positionType(h) !== type) return false;
    if (search && !h.ticker.toLowerCase().includes(search) &&
        !h.basket.toLowerCase().includes(search) &&
        !(h.name||'').toLowerCase().includes(search)) return false;
    return true;
  });

  document.getElementById('f-count').textContent =
    hasFilter ? `${filteredHoldings.length} of ${data.holdings.length}` : `${data.holdings.length} positions`;

  renderList();
}

function clearFilters() {
  document.getElementById('f-search').value = '';
  document.getElementById('f-basket').value = '';
  document.getElementById('f-tier').value = '';
  document.getElementById('f-status').value = '';
  document.getElementById('f-type').value = '';
  applyFilters();
}

function applySort(mode) {
  _sortMode = mode;
  renderList();
}

// Best available P&L % for a holding (IBKR → calculated → null)
function _getPnlPct(h) {
  const ibkr = _ibkrCache[h.ticker];
  if (ibkr?.pnlPct != null) return ibkr.pnlPct;
  const cost = parseCostBasis(h);
  const pc   = _priceCache[h.ticker];
  if (cost && pc?.c) return (pc.c - cost) / cost * 100;
  return null;
}

// ── Render list ──────────────────────────────────────────
function renderList() {
  const maxW = Math.max(...(window.STW_DATA?.holdings||[]).map(h=>h.current_weight??h.initial_weight??0));
  const narrow = !!selectedTicker;
  const panel = document.getElementById('list-panel');
  panel.className = 'list-panel' + (narrow?' narrow':'');

  // ── Sort helpers ──────────────────────────────────────
  const dateVal = h => h.action_date ? new Date(h.action_date).getTime() : 0;
  const sortFns = {
    conviction: null,   // handled by tier-group loop below
    az:         (a,b) => a.ticker.localeCompare(b.ticker),
    za:         (a,b) => b.ticker.localeCompare(a.ticker),
    recent:     (a,b) => dateVal(b) - dateVal(a),
    oldest:     (a,b) => dateVal(a) - dateVal(b),
    pnl_desc:   (a,b) => {
      const pa = _getPnlPct(a), pb = _getPnlPct(b);
      if (pa == null && pb == null) return 0;
      if (pa == null) return 1;
      if (pb == null) return -1;
      return pb - pa;
    },
    pnl_asc:    (a,b) => {
      const pa = _getPnlPct(a), pb = _getPnlPct(b);
      if (pa == null && pb == null) return 0;
      if (pa == null) return 1;
      if (pb == null) return -1;
      return pa - pb;
    },
    weight_desc: (a,b) => (b.current_weight??0) - (a.current_weight??0),
  };

  let html = '';

  const renderRow = h => {
    const t = TIERS[h.conviction];
    const isSelected = selectedTicker === h.ticker;
    const cw = h.current_weight ?? h.initial_weight ?? 0;
    const wPct = maxW > 0 ? (cw/maxW*100).toFixed(0) : 0;
    const wChanged = h.current_weight != null && h.current_weight !== h.initial_weight;
    html += `<div class="ticker-row${isSelected?' selected':''}" onclick="selectTicker('${h.ticker}')">
      <span class="row-rank">${String(h.rank).padStart(2,'0')}</span>
      <div class="row-bar" style="background:${t.color}"></div>
      <div class="row-main">
        <div class="row-sym" style="color:${isSelected?t.color:'var(--text)'}">${h.ticker}</div>
        <div class="row-info">
          ${basketTag(h.basket)}
          <span class="row-snippet">${(h.summary||'').replace(/"/g,'').slice(0,70)}…</span>
        </div>
      </div>
      <div class="row-right">
        <div class="row-weight">
          <span class="row-wnum" style="${wChanged?'color:var(--text)':''}">${cw.toFixed(1)}%</span>
          <div class="row-wbar-bg"><div class="row-wbar-fill" style="width:${wPct}%"></div></div>
        </div>
        <span class="row-date">${fmtDate(h.action_date)}</span>
        ${(() => {
          if (h.ticker === 'CASH') return '';
          const pc   = _priceCache[h.ticker];
          const ibkr = _ibkrCache[h.ticker];
          const price = pc?.c;
          if (!price) return '';
          let pctStr = '', pctCls = '';
          if (ibkr?.pnlPct != null) {
            pctStr = `${ibkr.pnlPct >= 0 ? '+' : ''}${ibkr.pnlPct.toFixed(1)}%`;
            pctCls = ibkr.pnlPct >= 0 ? 'price-up' : 'price-dn';
          } else {
            const cost = parseCostBasis(h);
            if (cost) {
              const pnl = (pc.c - cost) / cost * 100;
              pctStr = `${pnl >= 0 ? '+' : ''}${pnl.toFixed(1)}%`;
              pctCls = pnl >= 0 ? 'price-up' : 'price-dn';
            } else if (pc?.dp != null) {
              pctStr = `${pc.dp >= 0 ? '+' : ''}${pc.dp.toFixed(2)}%`;
              pctCls = (pc.dp >= 0 ? 'price-up' : 'price-dn') + ' row-price-day';
            }
          }
          return `<div class="row-price">
            <span class="row-price-num">$${price.toFixed(2)}</span>
            ${pctStr ? `<span class="row-price-chg ${pctCls}">${pctStr}</span>` : ''}
          </div>`;
        })()}
      </div>
      ${isSelected ? `<span style="color:${t.color};font-size:11px;flex-shrink:0">▶</span>` : ''}
    </div>`;
  };

  // ── Render: conviction-grouped (default) or flat-sorted ──
  if (_sortMode === 'conviction') {
    [5,4,3,2,1,0].forEach(conv => {
      const group = filteredHoldings.filter(h => h.conviction === conv);
      if (!group.length) return;
      const t = TIERS[conv];
      html += `<div class="tier-head" style="background:${t.bg};color:${t.color};border-color:${t.border}">
        ${t.label}
        <span class="tier-head-count">${group.length}</span>
      </div>`;
      group.forEach(h => renderRow(h));
    });
  } else {
    const fn = sortFns[_sortMode];
    const sorted = fn ? [...filteredHoldings].sort(fn) : [...filteredHoldings];
    sorted.forEach(h => renderRow(h));
  }

  if (!html) html = '<div class="empty">No positions match your filters.</div>';
  panel.innerHTML = html;
}

// ── Select ticker ────────────────────────────────────────
function selectTicker(ticker) {
  if (selectedTicker === ticker) {
    closeDetail(); return;
  }
  detailEditMode = false;
  selectedTicker = ticker;
  const h = window.STW_DATA?.holdings?.find(x=>x.ticker===ticker);
  if (!h) return;

  renderList();
  renderDetail(h);

  document.getElementById('detail-panel').classList.add('open');
}

function closeDetail() {
  detailEditMode = false;
  selectedTicker = null;
  document.getElementById('detail-panel').classList.remove('open');
  renderList();
}

// ── Inline edit (Supabase-backed) ────────────────────────
let detailEditMode = false;

async function commitEdit(ticker) {
  const h = window.STW_DATA?.holdings?.find(x => x.ticker === ticker);
  if (!h) return;

  const conv = document.getElementById('edit-conviction')?.value;
  const act  = document.getElementById('edit-last-action')?.value;
  const date = document.getElementById('edit-action-date')?.value;
  const iw   = document.getElementById('edit-initial-weight')?.value;
  const wt   = document.getElementById('edit-current-weight')?.value;
  const pos  = document.getElementById('edit-position-detail')?.value;

  const updates = {};
  if (conv !== '' && conv !== undefined) updates.conviction      = Number(conv);
  if (act  !== '' && act  !== undefined) updates.last_action     = act;
  if (date !== '' && date !== undefined) updates.action_date     = date || null;
  if (iw   !== '')                       updates.initial_weight  = iw ? parseFloat(iw) : null;
  if (wt   !== '' && wt   !== undefined) updates.current_weight  = parseFloat(wt);
  if (pos  !== undefined)                updates.position_detail = pos.trim() || null;

  // Optimistic update
  Object.assign(h, updates);
  detailEditMode = false;
  renderDetail(h);
  renderList();
  renderBasketBar();

  // Persist to Supabase
  try {
    await dbSave(ticker, updates);
  } catch (e) {
    console.error('Save failed:', e.message);
    document.getElementById('hdr-meta').textContent = '⚠ Save failed — check console';
  }
}

function cancelEdit(ticker) {
  detailEditMode = false;
  const h = window.STW_DATA?.holdings?.find(x => x.ticker === ticker);
  if (h) renderDetail(h);
}

function toggleEditMode(ticker) {
  detailEditMode = !detailEditMode;
  const h = window.STW_DATA?.holdings?.find(x => x.ticker === ticker);
  if (h) renderDetail(h);
}

    return rows.map(r => {

  document.getElementById('gx-levels-wrap').innerHTML = `

async function initCharts() {
  const tf = _currentTF || '30m';

  // Stop any running live-price timer
  if (_liveTimer) { clearInterval(_liveTimer); _liveTimer = null; }

  // Destroy existing chart instances
  Object.values(_lwCharts).forEach(c => { try { c.remove(); } catch(e){} });
  _lwCharts = {};
  _lwSeries = {};

  // TwelveData interval names + bar count per timeframe
  const TF = {
    '5m':  { interval: '5min',  outputsize: 390, visible: 80  },
    '15m': { interval: '15min', outputsize: 300, visible: 80  },
    '30m': { interval: '30min', outputsize: 200, visible: 70  },
    '1h':  { interval: '1h',    outputsize: 200, visible: 50  },
    '4h':  { interval: '4h',    outputsize: 200, visible: 40  },
    '1d':  { interval: '1day',  outputsize: 500, visible: 120 },
    '1W':  { interval: '1week', outputsize: 260, visible: 104 },
  };
  const cfg = TF[tf] || TF['30m'];

  async function fetchBars(symbol) {
    const url = `https://api.twelvedata.com/time_series`
              + `?symbol=${symbol}&interval=${cfg.interval}`
              + `&outputsize=${cfg.outputsize}&timezone=UTC`
              + `&apikey=${TWELVEDATA_KEY}`;
    try {
      const data = await (await fetch(url)).json();
      if (data.status !== 'ok' || !data.values?.length) return [];
      // TwelveData returns newest-first — reverse so chart gets oldest→newest
      return [...data.values].reverse().map(v => ({
        time:  Math.floor(new Date(v.datetime.replace(' ', 'T') + 'Z').getTime() / 1000),
        open:  parseFloat(v.open),
        high:  parseFloat(v.high),
        low:   parseFloat(v.low),
        close: parseFloat(v.close),
      }));
    } catch(e) { return []; }
  }

  function calcEMA(bars, period) {
    if (bars.length < 2) return [];
    const k = 2 / (period + 1);
    let ema = bars[0].close;
    return bars.map(b => {
      ema = b.close * k + ema * (1 - k);
      return { time: b.time, value: +ema.toFixed(4) };
    });
  }

  function buildChart(divId, bars, levels) {
    const el = document.getElementById(divId);
    if (!el) return { chart: null, candles: null };
    el.innerHTML = '';

    if (!bars.length) {
      el.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#9CA3AF;font-size:12px">No data</div>';
      return { chart: null, candles: null };
    }

    const showTime = !['1d','1W'].includes(tf);
    const chart = LightweightCharts.createChart(el, {
      autoSize: true,
      layout: { background: { type: 'solid', color: '#ffffff' }, textColor: '#78716C' },
      grid: {
        vertLines: { color: 'rgba(229,221,210,0.5)' },
        horzLines: { color: 'rgba(229,221,210,0.5)' },
      },
      rightPriceScale: { borderColor: '#E5DDD2' },
      timeScale: { borderColor: '#E5DDD2', timeVisible: showTime, secondsVisible: false },
      crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    });

    const candles = chart.addCandlestickSeries({
      upColor: '#22C55E', downColor: '#EF4444',
      borderUpColor: '#16A34A', borderDownColor: '#DC2626',
      wickUpColor: '#16A34A', wickDownColor: '#DC2626',
    });
    candles.setData(bars);

    // EMAs: 5 / 9 / 21 / 50
    [[5,'#22C55E'],[9,'#06B6D4'],[21,'#F97316'],[50,'#EF4444']].forEach(([period, color]) => {
      const emaData = calcEMA(bars, period);
      if (!emaData.length) return;
      chart.addLineSeries({
        color, lineWidth: 2,
        priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false,
      }).setData(emaData);
    });

    // GEX level lines
    if (levels) {
      [
        ['resistance',    '#EF4444', 'Resistance',    1],
        ['gex1',          '#D97706', 'GEX1',          1],
        ['put_support',   '#22C55E', 'Put Support',   1],
        ['key_target',    '#6366F1', 'Target',        2],
        ['downside_risk', '#F97316', 'Downside Risk', 2],
      ].forEach(([key, color, title, style]) => {
        if (!levels[key]) return;
        candles.createPriceLine({ price: levels[key], color, lineWidth: 1, lineStyle: style, axisLabelVisible: true, title });
      });
    }

    // Zoom to most recent bars
    const total = bars.length;
    if (total > cfg.visible) {
      chart.timeScale().setVisibleLogicalRange({ from: total - cfg.visible - 0.5, to: total + 0.5 });
    } else {
      chart.timeScale().fitContent();
    }

    return { chart, candles };
  }

  // Loading placeholders
  ['chart-spy','chart-qqq'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#9CA3AF;font-size:12px">Loading…</div>';
  });

  const [spyBars, qqqBars] = await Promise.all([fetchBars('SPY'), fetchBars('QQQ')]);

  const gx = window.GRADDOX_DATA;
  const spyLevels = gx?.spx
    ? Object.fromEntries(Object.entries(gx.spx).map(([k, v]) => [k, v ? +(v / 10).toFixed(2) : null]))
    : null;
  const qqqLevels = gx?.qqq || null;

  const spy = buildChart('chart-spy', spyBars, spyLevels);
  const qqq = buildChart('chart-qqq', qqqBars, qqqLevels);
  _lwCharts.spy = spy.chart;
  _lwCharts.qqq = qqq.chart;
  _lwSeries.spy  = { candles: spy.candles, lastBar: spyBars[spyBars.length - 1] };
  _lwSeries.qqq  = { candles: qqq.candles, lastBar: qqqBars[qqqBars.length - 1] };

  // Live price via Finnhub quote — updates the current candle every 30s
  // Only run during intraday timeframes (no point on 1d/1W)
  if (['5m','15m','30m','1h','4h'].includes(tf)) {
    async function updateLive() {
      try {
        const [sq, qq] = await Promise.all([
          fetch(`https://finnhub.io/api/v1/quote?symbol=SPY&token=${FINNHUB_KEY}`).then(r=>r.json()),
          fetch(`https://finnhub.io/api/v1/quote?symbol=QQQ&token=${FINNHUB_KEY}`).then(r=>r.json()),
        ]);
        [['spy', sq], ['qqq', qq]].forEach(([key, q]) => {
          const s = _lwSeries[key];
          if (!s?.candles || !s?.lastBar || !q.c) return;
          s.candles.update({
            time:  s.lastBar.time,
            open:  s.lastBar.open,
            high:  Math.max(s.lastBar.high, q.c),
            low:   Math.min(s.lastBar.low,  q.c),
            close: q.c,
          });
        });
      } catch(e) {}
    }
    updateLive();
    _liveTimer = setInterval(updateLive, 30000);
  }
}

// ── Option leg parser ────────────────────────────────────
const _MONTH = {
  jan:'01',feb:'02',mar:'03',apr:'04',may:'05',jun:'06',
  jul:'07',aug:'08',sep:'09',oct:'10',nov:'11',dec:'12'
};
function _toExpiry(monthStr, dayStr, yearStr) {
  const m = _MONTH[(monthStr||'').toLowerCase().slice(0,3)];
  if (!m) return null;
  let day = dayStr;
  let yr  = '2026';
  if (yearStr) {
    const n = parseInt(yearStr.replace(/'/g,''));
    if (n >= 25) {
      // Looks like a 2-digit year (25, 26, 27…)
      yr = `20${String(n).padStart(2,'0')}`;
    } else {
      // Small number (e.g. 17, 18) — it's a day, not year 2017/2018
      // e.g. "$22.5C July 17 @ $3.35" → day=17, yr=2026
      day = day || String(n);
      yr  = '2026';
    }
  }
  return day ? `${yr}${m}${day.padStart(2,'0')}` : `${yr}${m}`;
}

function parseOptionLegs(h) {
  const d = h.position_detail || '';
  if (!d || h.ticker === 'CASH') return [];
  const legs = [];

  // Pattern A: $STRIKE[C|P] MONTH [DAY] ['YY] @ $ENTRY
  // e.g. "$22.5C Oct '26 @ $2.67"  "$6C Sep 18 '26 @ $0.87"
  const reA = /\$?(\d+\.?\d*)\s*([CP])\s+([A-Za-z]+)\s+(?:(\d{1,2})\s+'?(\d{2})|'?(\d{2}))\s*@\s*\$?(\d+\.?\d*)/gi;
  let m;
  while ((m = reA.exec(d)) !== null) {
    const expiry = _toExpiry(m[3], m[4]||null, m[5]||m[6]);
    if (expiry) legs.push({ symbol:h.ticker, strike:parseFloat(m[1]),
      right:m[2].toUpperCase(), expiry, entry:parseFloat(m[7]) });
  }

  // Pattern B: MONTH ['YY] $STRIKE[C|P] @$ENTRY
  // e.g. "Aug '26 $4C @$0.90"
  const reB = /([A-Za-z]+)\s+'?(\d{2})\s+\$?(\d+\.?\d*)\s*([CP])\s*@\$?(\d+\.?\d*)/gi;
  while ((m = reB.exec(d)) !== null) {
    const expiry = _toExpiry(m[1], null, m[2]);
    if (expiry) legs.push({ symbol:h.ticker, strike:parseFloat(m[3]),
      right:m[4].toUpperCase(), expiry, entry:parseFloat(m[5]) });
  }

  // Deduplicate (Pattern A may catch what B would catch too)
  const seen = new Set();
  return legs.filter(l => {
    const key = `${l.strike}${l.right}${l.expiry}`;
    if (seen.has(key)) return false;
    seen.add(key); return true;
  });
}

async function fetchIBKR() {
  const dot   = document.getElementById('ibkr-dot');
  const label = document.getElementById('ibkr-label');
  dot.style.background = '#F59E0B';
  label.textContent = 'IBKR…';

  try {
    // Collect all option legs across all holdings
    const allLegs = [];
    (window.STW_DATA?.holdings || []).forEach(h => {
      parseOptionLegs(h).forEach(leg => allLegs.push(leg));
    });

    if (!allLegs.length) {
      dot.style.background = '#F59E0B';
      label.textContent = 'IBKR';
      label.title = 'No parseable option legs found';
      return;
    }

    const res = await fetch('https://localhost:8765/option_prices', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(allLegs),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const results = await res.json();
    if (results.error) throw new Error(results.error);

    // Group by ticker
    const fetchedAt = Date.now();
    _ibkrCache = {};
    results.forEach(r => {
      if (!_ibkrCache[r.symbol]) _ibkrCache[r.symbol] = { legs: [], ts: fetchedAt };
      _ibkrCache[r.symbol].legs.push(r);
    });

    // Aggregate P&L per ticker
    Object.entries(_ibkrCache).forEach(([t, v]) => {
      const valid = v.legs.filter(l => l.price != null && l.entry != null);
      if (!valid.length) return;
      const totalPnlPct = valid.reduce((s,l) => s + (l.pnl_pct || 0), 0) / valid.length;
      v.pnlPct = totalPnlPct;
    });

    _ibkrLive = true;
    _saveIBKRCache();

    // Surface ambiguous contracts as a visible alert
    const ambiguous = results.filter(r => r.error === 'ambiguous');
    if (ambiguous.length) {
      const lines = ambiguous.map(r => {
        const opts = (r.possibles||[]).map(p => p.expiry).join(', ');
        return `• ${r.symbol} $${r.strike}${r.right} — possible dates: ${opts}\n  → fix position_detail to include exact date`;
      }).join('\n\n');
      alert(`⚠️ Ambiguous option contracts — please update position_detail with a specific expiry date:\n\n${lines}`);
    }

    dot.style.background = '#22C55E';
    const priced = results.filter(r => r.price != null).length;
    label.textContent = `IBKR ✓ (${priced}/${allLegs.length})`;

    renderList();
    if (selectedTicker) {
      const h = window.STW_DATA?.holdings?.find(x => x.ticker === selectedTicker);
      if (h) renderDetail(h);
    }
  } catch (e) {
    dot.style.background = '#EF4444';
    label.textContent = 'IBKR ✗';
    label.title = e.message;
    console.error('IBKR proxy error:', e.message, e);
  }
}

// ── Live prices (Finnhub /quote) ────────────────────────
async function fetchLivePrices() {
  const data = window.STW_DATA;
  if (!data) return;
  const tickers = [...new Set(
    data.holdings.filter(h => h.ticker !== 'CASH').map(h => h.ticker)
  )];
  const results = await Promise.allSettled(
    tickers.map(t =>
      fetch(`https://finnhub.io/api/v1/quote?symbol=${t}&token=${FINNHUB_KEY}`)
        .then(r => r.json())
        .then(q => ({ ticker: t, ...q }))
    )
  );
  results.forEach(r => {
    if (r.status === 'fulfilled' && r.value?.c) {
      _priceCache[r.value.ticker] = r.value;
    }
  });
  renderList();
  // Also refresh detail panel if open
  if (selectedTicker) {
    const h = data.holdings.find(x => x.ticker === selectedTicker);
    if (h) renderDetail(h);
  }
}

function renderAll() {
  const data = window.STW_DATA;
  if (!data) return;
  document.getElementById('hdr-meta').textContent = fmtUpdated(data.last_updated);
  populateFilters();
  filteredHoldings = [...data.holdings];
  document.getElementById('f-count').textContent = `${data.holdings.length} positions`;
  renderBasketBar();
  // Restore IBKR cache from localStorage so last-known option prices show immediately
  _loadIBKRCache();
  // Reflect cached state in IBKR button
  const cachedTickers = Object.keys(_ibkrCache).filter(t => _ibkrCache[t]?.pnlPct != null);
  if (cachedTickers.length) {
    const dot = document.getElementById('ibkr-dot');
    const lbl = document.getElementById('ibkr-label');
    if (dot) dot.style.background = '#F59E0B';  // amber = cached, not live
    if (lbl) lbl.textContent = `IBKR (cached)`;
  }
  renderList();
  renderGraddox();
  restoreTab();
  // Fetch live prices in the background — re-renders list/detail when done
  fetchLivePrices();
}

async function init() {
  const meta = document.getElementById('hdr-meta');
  const dot  = document.getElementById('db-dot');
  meta.textContent = 'Connecting…';
  dot.style.background = '#F59E0B';

  try {
    await dbFetch();
    dot.style.background = '#22C55E';
  } catch (e) {
    console.warn('Supabase unavailable, using embedded data:', e.message);
    dot.style.background = '#EF4444';
    dot.title = 'Offline — showing cached data';
  }

  renderAll();
}

// init() is called by the auth state listener after login — not on page load
</script>
