  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #F7F5F1;
      --surface:  #FFFFFF;
      --s2:       #F3EFE8;
      --border:   #E5DDD2;
      --bsub:     #EDE8DF;
      --text:     #1C1917;
      --t2:       #57534E;
      --t3:       #A8A29E;

      /* Tier colors */
      --c5:  #C2410C; --c5bg: #FFF7ED; --c5b: #FED7AA; --c5l: #EA580C;
      --c4:  #1D4ED8; --c4bg: #EFF6FF; --c4b: #BFDBFE; --c4l: #3B82F6;
      --c3:  #B45309; --c3bg: #FFFBEB; --c3b: #FDE68A; --c3l: #D97706;
      --c2:  #6B7280; --c2bg: #F9FAFB; --c2b: #D1D5DB; --c2l: #9CA3AF;
      --c1:  #B91C1C; --c1bg: #FFF5F5; --c1b: #FECACA; --c1l: #EF4444;
      --c0:  #71717A; --c0bg: #F4F4F5; --c0b: #D4D4D8; --c0l: #A1A1AA;

      /* Action badges */
      --new:     #15803D; --new-bg:     #DCFCE7;
      --closed:  #DC2626; --closed-bg:  #FEE2E2;
      --upsized: #1D4ED8; --upsized-bg: #DBEAFE;
      --trimmed: #D97706; --trimmed-bg: #FEF3C7;
      --hold:    #57534E; --hold-bg:    #F3F4F6;

      --r: 10px; --rsm: 6px;
      --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Header ─────────────────────────── */
    .hdr {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      display: flex;
      align-items: center;
      gap: 24px;
      height: 50px;
      flex-shrink: 0;
      z-index: 10;
    }

    .logo {
      display: flex; align-items: center; gap: 7px;
      font-weight: 600; font-size: 14px; letter-spacing: -0.01em;
      white-space: nowrap;
    }

    .logo-mark {
      width: 20px; height: 20px;
      background: #D97040;
      border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .logo-mark svg { width: 10px; height: 10px; }

    .nav { display: flex; gap: 2px; }

    .nav-btn {
      padding: 4px 11px; border-radius: var(--rsm);
      border: none; background: transparent;
      color: var(--t2); font-size: 12px; font-weight: 500;
      cursor: pointer; font-family: inherit; transition: all 0.12s;
    }
    .nav-btn:hover { background: var(--s2); color: var(--text); }
    .nav-btn.on { background: #FDF4EE; color: #D97040; }

    .hdr-right {
      margin-left: auto; display: flex; align-items: center; gap: 8px;
    }

    .live-dot {
      width: 6px; height: 6px; border-radius: 50%; background: #16A34A;
    }

    .hdr-meta { font-size: 11px; color: var(--t3); white-space: nowrap; }

    /* ── Subheader: Basket bar + Filters ─ */
    .subhdr {
      background: var(--surface);
      border-bottom: 1px solid var(--bsub);
      padding: 10px 20px;
      flex-shrink: 0;
    }

    .basket-bar {
      display: flex; height: 5px; border-radius: 3px; overflow: hidden;
      margin-bottom: 8px; gap: 2px;
    }

    .basket-seg {
      height: 100%; border-radius: 2px;
      transition: flex 0.3s;
    }

    .basket-legend {
      display: flex; flex-wrap: wrap; gap: 4px 14px;
      margin-bottom: 10px;
    }

    .bl-item {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; color: var(--t2); cursor: default;
    }

    .bl-pip {
      width: 7px; height: 7px; border-radius: 2px; flex-shrink: 0;
    }

    .bl-name { }

    .bl-pct {
      font-weight: 600; color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .filters {
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    }

    .filter-input, .filter-select {
      border: 1px solid var(--border);
      border-radius: var(--rsm);
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      padding: 5px 10px;
      outline: none;
      transition: border-color 0.15s;
    }

    .filter-input { width: 160px; }
    .filter-input:focus, .filter-select:focus { border-color: #D97040; }

    .filter-clear {
      padding: 5px 10px; border-radius: var(--rsm);
      border: 1px solid var(--border); background: transparent;
      color: var(--t3); font-size: 11px; font-family: inherit;
      cursor: pointer; transition: all 0.12s;
    }
    .filter-clear:hover { color: var(--text); border-color: var(--t2); }

    .filter-count {
      font-size: 11px; color: var(--t3); margin-left: auto;
    }

    /* ── Main split layout ───────────────── */
    .workspace {
      display: flex; flex: 1; overflow: hidden;
    }

    /* ── Ticker list ─────────────────────── */
    .list-panel {
      flex: 1;
      overflow-y: auto;
      border-right: 1px solid var(--border);
      transition: flex 0.25s ease;
    }

    .list-panel.narrow { flex: 0 0 42%; }

    /* ── Tier section ────────────────────── */
    .tier-head {
      padding: 7px 16px 5px;
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      position: sticky; top: 0; z-index: 2;
      border-bottom: 1px solid;
      display: flex; align-items: center; gap: 8px;
    }

    .tier-head-count {
      font-size: 9px; opacity: 0.6; font-weight: 500;
    }

    /* ── Ticker row ──────────────────────── */
    .ticker-row {
      display: flex; align-items: center;
      padding: 10px 16px; gap: 10px;
      border-bottom: 1px solid var(--bsub);
      cursor: pointer; transition: background 0.1s;
      position: relative;
    }

    .ticker-row:hover { background: #FAFAF7; }
    .ticker-row.selected { background: #FDF4EE; }

    .row-rank {
      font-size: 10px; color: var(--t3);
      min-width: 18px; text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .row-bar {
      width: 3px; border-radius: 2px;
      height: 32px; flex-shrink: 0;
    }

    .narrow .row-bar { height: 26px; }

    .row-main { flex: 1; min-width: 0; }

    .row-sym {
      font-weight: 700; font-size: 13px;
      letter-spacing: 0.02em;
    }

    .narrow .row-sym { font-size: 12px; }

    .row-info {
      display: flex; align-items: center; gap: 6px; margin-top: 2px;
      flex-wrap: wrap;
    }

    .narrow .row-info { display: none; }

    .row-snippet {
      font-size: 11px; color: var(--t3);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      max-width: 400px;
    }

    .narrow .row-snippet { display: none; }

    .row-right {
      display: flex; flex-direction: column;
      align-items: flex-end; gap: 3px; flex-shrink: 0;
    }

    .row-weight {
      display: flex; align-items: center; gap: 5px;
    }

    .row-wnum {
      font-size: 11px; font-weight: 500;
      font-variant-numeric: tabular-nums;
      color: var(--t2); min-width: 30px; text-align: right;
    }

    .row-wbar-bg {
      width: 36px; height: 3px; background: var(--bsub);
      border-radius: 2px;
    }

    .narrow .row-wbar-bg { display: none; }

    .row-wbar-fill {
      height: 3px; border-radius: 2px; background: #D97040;
    }

    .row-date {
      font-size: 10px; color: var(--t3);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    /* ── Tags ────────────────────────────── */
    .tag {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 1px 6px; border-radius: 3px;
      font-size: 10px; font-weight: 500; white-space: nowrap;
    }

    .tag-pip { width: 4px; height: 4px; border-radius: 50%; flex-shrink: 0; }

    .badge {
      display: inline-flex; align-items: center;
      padding: 1px 7px; border-radius: 20px;
      font-size: 10px; font-weight: 600; white-space: nowrap;
    }
    .badge-new     { background: var(--new-bg);     color: var(--new);     }
    .badge-closed  { background: var(--closed-bg);  color: var(--closed);  }
    .badge-upsized { background: var(--upsized-bg); color: var(--upsized); }
    .badge-trimmed { background: var(--trimmed-bg); color: var(--trimmed); }
    .badge-hold    { background: var(--hold-bg);    color: var(--hold);    }

    /* ── Detail panel ────────────────────── */
    .detail-panel {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: none;
    }

    .detail-panel.open { display: block; }

    .detail-close {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 10px; border-radius: var(--rsm);
      border: 1px solid var(--border); background: transparent;
      color: var(--t3); font-size: 11px; font-family: inherit;
      cursor: pointer; margin-bottom: 18px;
      transition: all 0.12s;
    }
    .detail-close:hover { color: var(--text); border-color: var(--t2); }

    .detail-hdr {
      display: flex; align-items: flex-start; gap: 12px; margin-bottom: 16px;
      justify-content: space-between;
    }

    .detail-vbar {
      width: 4px; border-radius: 2px;
      height: 52px; flex-shrink: 0; margin-top: 2px;
    }

    .detail-sym {
      font-size: 26px; font-weight: 700;
      letter-spacing: 0.02em; line-height: 1;
    }

    .detail-name {
      font-size: 12px; color: var(--t3); margin-top: 4px;
    }

    .detail-badges {
      display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px;
    }

    .detail-meta-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 8px; margin-bottom: 16px;
    }

    .meta-item { }

    .meta-label {
      font-size: 9px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--t3); margin-bottom: 3px;
    }

    .meta-value {
      font-size: 13px; font-weight: 500; color: var(--text);
    }

    /* Conviction meter */
    .conv-meter { margin-bottom: 16px; }

    .conv-label {
      font-size: 9px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--t3); margin-bottom: 6px;
    }

    .conv-segs {
      display: flex; gap: 3px; margin-bottom: 4px;
    }

    .conv-seg {
      flex: 1; height: 5px; border-radius: 3px;
      background: var(--bsub);
    }

    .conv-sub {
      display: flex; justify-content: space-between;
      font-size: 9px; color: var(--t3);
    }

    /* Summary block */
    .summary-block {
      border-radius: var(--rsm);
      padding: 12px 14px;
      font-size: 12px; line-height: 1.7; color: var(--t2);
      margin-bottom: 16px; border: 1px solid;
    }

    /* Bullets */
    .bullets-label {
      font-size: 9px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--t3); margin-bottom: 10px;
    }

    .bullets { display: flex; flex-direction: column; gap: 6px; }

    .bullet-item {
      display: flex; gap: 8px; align-items: flex-start;
      padding: 8px 10px; border-radius: var(--rsm);
      background: var(--s2); border: 1px solid var(--bsub);
    }

    .bullet-icon {
      font-size: 8px; margin-top: 3px; flex-shrink: 0;
    }

    .bullet-text { font-size: 12px; color: var(--t2); line-height: 1.6; }

    /* ── Inline edit form ───────────────── */
    .edit-btn {
      display: inline-flex; align-items: center; gap: 4px;
      margin-left: auto; padding: 4px 10px;
      border-radius: var(--rsm); border: 1px solid var(--border);
      background: transparent; color: var(--t3);
      font-size: 11px; font-family: inherit; cursor: pointer;
      transition: all 0.12s;
    }
    .edit-btn:hover { color: var(--text); border-color: var(--t2); }
    .edit-btn.active { color: var(--acc); border-color: var(--acc); background: rgba(99,102,241,0.06); }

    .edit-form {
      background: var(--s2); border: 1px solid var(--border);
      border-radius: var(--r); padding: 14px 16px; margin-bottom: 16px;
    }
    .edit-form-title {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--t3); margin-bottom: 12px;
    }
    .edit-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px;
    }
    .edit-row { display: flex; flex-direction: column; gap: 4px; }
    .edit-row.full { grid-column: 1 / -1; }
    .edit-label {
      font-size: 9px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.08em; color: var(--t3);
    }
    .edit-input, .edit-select {
      padding: 6px 8px; border-radius: var(--rsm);
      border: 1px solid var(--border); background: var(--surface);
      color: var(--text); font-size: 12px; font-family: inherit;
      transition: border-color 0.12s;
    }
    .edit-input:focus, .edit-select:focus {
      outline: none; border-color: var(--acc);
    }
    .edit-actions { display: flex; gap: 8px; }
    .edit-save {
      padding: 6px 14px; border-radius: var(--rsm);
      background: var(--acc); border: none;
      color: #fff; font-size: 12px; font-weight: 600;
      font-family: inherit; cursor: pointer;
    }
    .edit-save:hover { opacity: 0.88; }
    .edit-cancel {
      padding: 6px 12px; border-radius: var(--rsm);
      border: 1px solid var(--border); background: transparent;
      color: var(--t3); font-size: 12px; font-family: inherit; cursor: pointer;
    }
    .edit-cancel:hover { color: var(--text); }
    .edit-clear {
      margin-left: auto; padding: 6px 12px; border-radius: var(--rsm);
      border: 1px solid var(--border); background: transparent;
      color: var(--t3); font-size: 11px; font-family: inherit; cursor: pointer;
    }
    .edit-clear:hover { color: #DC2626; border-color: #DC2626; }

    .override-dot {
      display: inline-block; width: 5px; height: 5px;
      border-radius: 50%; background: var(--acc);
      margin-left: 4px; vertical-align: middle; flex-shrink: 0;
    }

    /* ── Gradoxx placeholder ─────────────── */
    .placeholder {
      padding: 80px 24px; text-align: center;
      color: var(--t3);
    }
    .placeholder h2 { font-size: 15px; font-weight: 600; color: var(--text); margin: 12px 0 6px; }
    .placeholder p { font-size: 13px; line-height: 1.6; max-width: 300px; margin: 0 auto; }

    .module { display: none; }
    .module.on {
      display: flex; flex-direction: column; flex: 1; overflow: hidden;
    }

    /* Empty state */
    .empty {
      padding: 48px 20px; text-align: center;
      color: var(--t3); font-size: 13px;
    }

    /* ── Graddox Module ──────────────────────── */
    .gx-subhdr {
      background: var(--surface);
      border-bottom: 1px solid var(--bsub);
      padding: 9px 20px;
      flex-shrink: 0;
      display: flex; align-items: center;
      gap: 10px; flex-wrap: wrap;
    }
    .gx-date { font-size: 12px; font-weight: 600; color: var(--text); }
    .gx-bias {
      font-size: 11px; font-weight: 600;
      padding: 2px 8px; border-radius: 4px;
      letter-spacing: 0.02em; flex-shrink: 0;
    }
    .gx-bias.bullish   { background:#DCFCE7; color:#15803D; }
    .gx-bias.bearish   { background:#FEE2E2; color:#DC2626; }
    .gx-bias.flat-down { background:#FEF3C7; color:#B45309; }
    .gx-bias.flat      { background:var(--s2); color:var(--t2); }
    .gx-bias-note { font-size: 11px; color: var(--t2); }
    .gx-upd { margin-left:auto; font-size:11px; color:var(--t3); white-space:nowrap; }

    .gx-body {
      display: flex; flex: 1; overflow: hidden;
    }
    .gx-left {
      flex: 0 0 300px; overflow-y: auto;
      padding: 14px; display: flex;
      flex-direction: column; gap: 10px;
    }
    .gx-right {
      flex: 1; overflow-y: auto;
      padding: 14px; display: flex;
      flex-direction: column; gap: 10px;
    }

    .gx-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .gx-card-hdr {
      padding: 8px 13px;
      background: var(--s2); border-bottom: 1px solid var(--bsub);
      font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.09em; color: var(--t2);
    }
    .gx-level-row {
      display: flex; align-items: center;
      padding: 8px 13px; gap: 9px;
      border-bottom: 1px solid var(--bsub);
    }
    .gx-level-row:last-child { border-bottom-color: transparent; }
    .gx-lvl-icon  { font-size: 12px; flex-shrink: 0; width: 16px; text-align: center; }
    .gx-lvl-price {
      font-size: 14px; font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.01em; min-width: 46px;
    }
    .gx-lvl-label { font-size: 11px; color: var(--t2); flex: 1; line-height: 1.35; }
    .gx-lvl-badge {
      font-size: 10px; font-weight: 600;
      padding: 2px 6px; border-radius: 3px; white-space: nowrap;
    }

    /* Signal table */
    .gx-sig-wrap { overflow-x: auto; padding-bottom: 9px; }
    .gx-sig-table {
      width: 100%; border-collapse: collapse;
      font-size: 11px; min-width: 480px;
    }
    .gx-sig-table th {
      text-align: left; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--t3); background: var(--s2);
      padding: 7px 13px; border-bottom: 1px solid var(--bsub);
    }
    .gx-sig-table td {
      padding: 9px 13px;
      border-bottom: 1px solid var(--bsub);
      vertical-align: top; line-height: 1.4;
    }
    .gx-sig-table tr:last-child td { border-bottom: none; }
    .gx-sig-trade { font-weight: 700; font-size: 12px; }
    .gx-sig-logic { font-size: 11px; color: var(--t2); }
    .gx-verdict {
      display: flex; align-items: center; gap: 4px;
      font-size: 10px; font-weight: 600; white-space: nowrap;
    }
    .gx-vdot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .gx-note-row td {
      background: var(--s2); font-size: 10px;
      color: var(--t3); padding: 5px 13px;
      border-bottom: none; border-top: 1px solid var(--bsub);
    }

    /* Day log */
    .gx-log-item {
      display: flex; gap: 12px;
      padding: 9px 13px; border-bottom: 1px solid var(--bsub);
    }
    .gx-log-item:last-child { border-bottom-color: transparent; }
    .gx-log-time {
      font-size: 10px; font-weight: 600; color: var(--t3);
      white-space: nowrap; min-width: 54px;
      padding-top: 2px; font-variant-numeric: tabular-nums;
    }
    .gx-log-text { font-size: 12px; color: var(--text); line-height: 1.5; }

    /* Timeframe buttons */
    .tf-btn {
      padding: 2px 7px; border-radius: 4px;
      border: 1px solid var(--border); background: transparent;
      color: var(--t2); font-size: 10px; font-weight: 600;
      font-family: inherit; cursor: pointer; transition: all 0.1s;
    }
    .tf-btn:hover { border-color: var(--t2); color: var(--text); }
    .tf-btn.on { background: #FDF4EE; color: #D97040; border-color: #D97040; }
  </style>
</head>

<body>

<!-- ── Auth Gate ─────────────────────────────── -->
<div id="auth-gate" style="display:flex; position:fixed; inset:0; background:#1C1917; z-index:9999; align-items:center; justify-content:center;">
  <div id="auth-box" style="background:#292524; border:1px solid #44403C; border-radius:16px; padding:48px 40px; text-align:center; max-width:380px; width:90%; box-shadow:0 25px 50px rgba(0,0,0,0.5);">
    <div style="width:48px;height:48px;background:#C2410C;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
      <svg viewBox="0 0 10 10" fill="none" width="22" height="22"><path d="M5 1L9 8H1L5 1Z" fill="white"/></svg>
    </div>
    <h2 style="color:#F5F5F4;font-size:18px;font-weight:600;margin:0 0 6px;">STW Companion</h2>
    <p style="color:#78716C;font-size:13px;margin:0 0 32px;">Private portfolio dashboard</p>
    <button onclick="signInWithGoogle()" style="width:100%;background:#4F46E5;color:white;border:none;border-radius:8px;padding:11px 20px;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
        <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z" fill="#34A853"/>
        <path d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.175 0 7.548 0 9s.347 2.825.957 4.039l3.007-2.332z" fill="#FBBC05"/>
        <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.166 6.656 3.58 9 3.58z" fill="#EA4335"/>
      </svg>
      Sign in with Google
    </button>
    <p id="auth-error" style="color:#EF4444;font-size:12px;margin-top:14px;display:none;"></p>
  </div>
</div>

<!-- ── Header ──────────────────────────────── -->
<header class="hdr">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 10 10" fill="none"><path d="M5 1L9 8H1L5 1Z" fill="white"/></svg>
    </div>
    STW Companion
  </div>
  <nav class="nav">
    <button class="nav-btn on" onclick="showModule('stw',this)">STW Stock Picks</button>
    <button class="nav-btn" onclick="showModule('gradoxx',this)">Graddox GEX Signals</button>
  </nav>
  <div class="hdr-right">
    <div class="live-dot" id="db-dot"></div>
    <span class="hdr-meta" id="hdr-meta">–</span>
    <button id="signout-btn" onclick="signOut()" style="display:none; margin-left:10px; padding:4px 10px; border-radius:6px; border:1px solid var(--border); background:var(--surface); color:var(--t2); font-size:12px; cursor:pointer;">Sign out</button>
  </div>
</header>

<!-- ── STW Module ────────────────────────────── -->
<div class="module on" id="mod-stw">

  <!-- Subheader: basket bar + filters -->
  <div class="subhdr">
    <div class="basket-bar" id="basket-bar"></div>
    <div class="basket-legend" id="basket-legend"></div>
    <div class="filters">
      <input class="filter-input" id="f-search" placeholder="Search ticker…" oninput="applyFilters()">
      <select class="filter-select" id="f-basket" onchange="applyFilters()">
        <option value="">All Baskets</option>
      </select>
      <select class="filter-select" id="f-tier" onchange="applyFilters()">
        <option value="">All Tiers</option>
        <option value="5">Tier 1 — Highest</option>
        <option value="4">Tier 2 — High</option>
        <option value="3">Tier 3 — Moderate</option>
        <option value="2">Tier 4 — Waning</option>
        <option value="1">Tier 5 — Concern</option>
      </select>
      <button class="filter-clear" id="f-clear" onclick="clearFilters()" style="display:none">Clear</button>
      <span class="filter-count" id="f-count"></span>
    </div>
  </div>

  <!-- Split workspace -->
  <div class="workspace">
    <div class="list-panel" id="list-panel"></div>
    <div class="detail-panel" id="detail-panel">
      <button class="detail-close" onclick="closeDetail()">← Close</button>
      <div id="detail-content"></div>
    </div>
  </div>

</div>

<!-- ── Graddox Module ────────────────────────── -->
<div class="module" id="mod-gradoxx">

  <!-- Subhdr: filled by renderGraddox() -->
  <div id="gx-subhdr-wrap"></div>

  <!-- Body -->
  <div class="gx-body">

    <!-- Left column: SPX/QQQ levels — filled by renderGraddox() -->
    <div class="gx-left" id="gx-levels-wrap"></div>

    <!-- Right column: charts (static) + signals/log (dynamic) -->
    <div class="gx-right">

      <!-- Charts: filled by initCharts() -->
      <div class="gx-card" style="overflow:hidden;flex-shrink:0;padding:0">
        <div class="gx-card-hdr" style="padding:8px 13px;display:flex;align-items:center;gap:10px">
          <span>📈 SPY &amp; QQQ</span>
          <div style="display:flex;gap:3px" id="tf-btn-group">
            <button class="tf-btn"    onclick="switchTF('5m',this)">5m</button>
            <button class="tf-btn"    onclick="switchTF('15m',this)">15m</button>
            <button class="tf-btn on" onclick="switchTF('30m',this)">30m</button>
            <button class="tf-btn"    onclick="switchTF('1h',this)">1h</button>

db.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_IN' || event === 'INITIAL_SESSION') {
    if (!session) return;
    const email = session.user.email;
    if (AUTHORIZED_EMAILS.includes(email)) {
      document.getElementById('auth-gate').style.display = 'none';
      document.getElementById('signout-btn').style.display = 'inline-block';
      if (!window._dashboardLoaded) {
        window._dashboardLoaded = true;
        init();
      }
    } else {
      showUnauthorized(email);
    }
  } else if (event === 'SIGNED_OUT') {
    window._dashboardLoaded = false;
    document.getElementById('auth-gate').style.display = 'flex';
    document.getElementById('signout-btn').style.display = 'none';
    showAuthBox();
  }

async function dbFetch() {
  const [{ data: holdings, error: hErr }, { data: gx }] = await Promise.all([
    db.from('holdings').select('*').order('rank'),
    db.from('graddox').select('*').eq('id', 1).maybeSingle()
  ]);
  if (hErr) throw hErr;
  const last_updated = holdings.reduce((m, h) => h.updated_at > m ? h.updated_at : m, '');
  window.STW_DATA = { last_updated, holdings };
  if (gx) window.GRADDOX_DATA = gx;
}

async function dbSave(ticker, updates) {
  const { error } = await db.from('holdings').upsert(
    { ticker, ...updates, updated_at: new Date().toISOString() },
    { onConflict: 'ticker' }
  );
  if (error) throw error;
}

// ── Tiers ─────────────────────────────────────────────────
const TIERS = {
  5: { label:"Tier 1 — Highest Conviction", short:"HIGHEST", color:"var(--c5)", bg:"var(--c5bg)", border:"var(--c5b)", light:"var(--c5l)" },
  4: { label:"Tier 2 — High Conviction",    short:"HIGH",    color:"var(--c4)", bg:"var(--c4bg)", border:"var(--c4b)", light:"var(--c4l)" },
  3: { label:"Tier 3 — Moderate",           short:"MODERATE",color:"var(--c3)", bg:"var(--c3bg)", border:"var(--c3b)", light:"var(--c3l)" },
  2: { label:"Tier 4 — Waning Interest",    short:"WANING",  color:"var(--c2)", bg:"var(--c2bg)", border:"var(--c2b)", light:"var(--c2l)" },
  1: { label:"Tier 5 — Concern",            short:"CONCERN", color:"var(--c1)", bg:"var(--c1bg)", border:"var(--c1b)", light:"var(--c1l)" },
  0: { label:"Tier 6 — Legacy Positions",   short:"LEGACY",  color:"var(--c0)", bg:"var(--c0bg)", border:"var(--c0b)", light:"var(--c0l)" },
};

const BASKET_COLORS = {
  "Robotics & Edge AI": "#7C3AED",
  "Data Center":        "#2563EB",
  "Telecom & Voice AI": "#D97706",
  "Power Infrastructure":"#16A34A",
  "Defense":            "#D97040",
  "Chips":              "#DC2626",
};

function bColor(b) { return BASKET_COLORS[b] || "#A8A29E"; }

// ── State ────────────────────────────────────────────────
let selectedTicker = null;
let filteredHoldings = [];

// ── Helpers ──────────────────────────────────────────────
function fmtDate(s) {
  if (!s) return '–';
  const d = new Date(s + 'T12:00:00');
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'2-digit' });
}

const ET = { timeZone: 'America/New_York' };

function fmtUpdated(s) {
  if (!s) return '–';
  const d = new Date(s);
  return 'Updated ' + d.toLocaleDateString('en-US',{month:'short',day:'numeric',...ET})
    + ' · ' + d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',...ET})
    + ' EST';
}

function basketTag(name) {
  const c = bColor(name);
  return `<span class="tag" style="background:${c}18;color:${c};border:1px solid ${c}28">
    <span class="tag-pip" style="background:${c}"></span>${name}
  </span>`;
}

function actionBadge(a) {
  if (!a) return '';
  const k = a.toLowerCase();
  const cls = ['new','closed','upsized','trimmed','hold'].includes(k) ? `badge-${k}` : 'badge-hold';
  return `<span class="badge ${cls}">${a}</span>`;
}

// ── Basket bar + legend ──────────────────────────────────
function renderBasketBar() {
  const data = window.STW_DATA;
  if (!data) return;
  const map = {};
  data.holdings.forEach(h => {
    const w = h.current_weight ?? h.initial_weight ?? 0;
    map[h.basket] = (map[h.basket]||0) + w;
  });
  const total = Object.values(map).reduce((s,v)=>s+v, 0);
  const entries = Object.entries(map).sort((a,b)=>b[1]-a[1]);

  // Bar segments
  document.getElementById('basket-bar').innerHTML = entries.map(([name, w]) => {
    const c = bColor(name);
    return `<div class="basket-seg" style="flex:${w};background:${c};opacity:0.85"></div>`;
  }).join('');

  // Legend
  document.getElementById('basket-legend').innerHTML = entries.map(([name, w]) => {
    const pct = (w/total*100).toFixed(0);
    const c = bColor(name);
    return `<div class="bl-item">
      <div class="bl-pip" style="background:${c}"></div>
      <span class="bl-name">${name}</span>
      <span class="bl-pct">${pct}%</span>
    </div>`;
  }).join('');
}

// ── Populate basket filter ───────────────────────────────
function populateFilters() {
  const data = window.STW_DATA;
  if (!data) return;
  const baskets = [...new Set(data.holdings.map(h=>h.basket))].sort();
  const sel = document.getElementById('f-basket');
  baskets.forEach(b => {
    const opt = document.createElement('option');
    opt.value = b; opt.textContent = b;
    sel.appendChild(opt);
  });
}

// ── Apply filters ────────────────────────────────────────
function applyFilters() {
  const data = window.STW_DATA;
  if (!data) return;

  const search = document.getElementById('f-search').value.toLowerCase();
  const basket = document.getElementById('f-basket').value;
  const tier   = document.getElementById('f-tier').value;
  const hasFilter = search || basket || tier;

  document.getElementById('f-clear').style.display = hasFilter ? 'block' : 'none';

  filteredHoldings = data.holdings.filter(h => {
    if (basket && h.basket !== basket) return false;
    if (tier   && h.conviction !== Number(tier)) return false;
    if (search && !h.ticker.toLowerCase().includes(search) &&
        !h.basket.toLowerCase().includes(search) &&
        !(h.name||'').toLowerCase().includes(search)) return false;
    return true;
  });

  document.getElementById('f-count').textContent =
    hasFilter ? `${filteredHoldings.length} of ${data.holdings.length}` : `${data.holdings.length} positions`;

  renderList();
}

function clearFilters() {
  document.getElementById('f-search').value = '';
  document.getElementById('f-basket').value = '';
  document.getElementById('f-tier').value = '';
  applyFilters();
}

// ── Render list ──────────────────────────────────────────
function renderList() {
  const maxW = Math.max(...(window.STW_DATA?.holdings||[]).map(h=>h.current_weight??h.initial_weight??0));
  const narrow = !!selectedTicker;
  const panel = document.getElementById('list-panel');
  panel.className = 'list-panel' + (narrow?' narrow':'');

  let html = '';
  [5,4,3,2,1,0].forEach(conv => {
    const group = filteredHoldings.filter(h => h.conviction === conv);
    if (!group.length) return;
    const t = TIERS[conv];
    const count = group.length;
    html += `<div class="tier-head" style="color:${t.color};background:${t.bg};border-color:${t.border}">
      ${t.label}
      <span class="tier-head-count">${count}</span>
    </div>`;
    group.forEach(h => {
      const isSelected = selectedTicker === h.ticker;
      const cw = h.current_weight ?? h.initial_weight ?? 0;
      const wPct = maxW > 0 ? (cw/maxW*100).toFixed(0) : 0;
      const wChanged = h.current_weight != null && h.current_weight !== h.initial_weight;
      const c = bColor(h.basket);
      html += `<div class="ticker-row${isSelected?' selected':''}" onclick="selectTicker('${h.ticker}')">
        <span class="row-rank">${String(h.rank).padStart(2,'0')}</span>
        <div class="row-bar" style="background:${t.color}"></div>
        <div class="row-main">
          <div class="row-sym" style="color:${isSelected?t.color:'var(--text)'}">${h.ticker}</div>
          <div class="row-info">
            ${basketTag(h.basket)}
            <span class="row-snippet">${(h.summary||'').replace(/"/g,'').slice(0,70)}…</span>
          </div>
        </div>
        <div class="row-right">
          <div class="row-weight">
            <span class="row-wnum" style="${wChanged?'color:var(--text)':''}">${cw.toFixed(1)}%</span>
            <div class="row-wbar-bg"><div class="row-wbar-fill" style="width:${wPct}%"></div></div>
          </div>
          <span class="row-date">${fmtDate(h.action_date)}</span>
        </div>
        ${isSelected?`<span style="color:${t.color};font-size:11px;flex-shrink:0">▶</span>`:''}
      </div>`;
    });
  });

  if (!html) html = '<div class="empty">No positions match your filters.</div>';
  panel.innerHTML = html;
}

// ── Select ticker ────────────────────────────────────────
function selectTicker(ticker) {
  if (selectedTicker === ticker) {
    closeDetail(); return;
  }
  detailEditMode = false;
  selectedTicker = ticker;
  const h = window.STW_DATA?.holdings?.find(x=>x.ticker===ticker);
  if (!h) return;

  renderList();
  renderDetail(h);

  document.getElementById('detail-panel').classList.add('open');
}

function closeDetail() {
  detailEditMode = false;
  selectedTicker = null;
  document.getElementById('detail-panel').classList.remove('open');
  renderList();
}

// ── Inline edit (Supabase-backed) ────────────────────────
let detailEditMode = false;

async function commitEdit(ticker) {
  const h = window.STW_DATA?.holdings?.find(x => x.ticker === ticker);
  if (!h) return;

  const conv = document.getElementById('edit-conviction')?.value;
  const act  = document.getElementById('edit-last-action')?.value;
  const date = document.getElementById('edit-action-date')?.value;
  const iw   = document.getElementById('edit-initial-weight')?.value;
  const wt   = document.getElementById('edit-current-weight')?.value;
  const pos  = document.getElementById('edit-position-detail')?.value;

  const updates = {};
  if (conv !== '' && conv !== undefined) updates.conviction      = Number(conv);
  if (act  !== '' && act  !== undefined) updates.last_action     = act;
  if (date !== '' && date !== undefined) updates.action_date     = date || null;
  if (iw   !== '')                       updates.initial_weight  = iw ? parseFloat(iw) : null;
  if (wt   !== '' && wt   !== undefined) updates.current_weight  = parseFloat(wt);
  if (pos  !== undefined)                updates.position_detail = pos.trim() || null;

  // Optimistic update
  Object.assign(h, updates);
  detailEditMode = false;
  renderDetail(h);
  renderList();
  renderBasketBar();

  // Persist to Supabase
  try {
    await dbSave(ticker, updates);
  } catch (e) {
    console.error('Save failed:', e.message);
    document.getElementById('hdr-meta').textContent = '⚠ Save failed — check console';
  }
}

function cancelEdit(ticker) {
  detailEditMode = false;
  const h = window.STW_DATA?.holdings?.find(x => x.ticker === ticker);
  if (h) renderDetail(h);
}

function toggleEditMode(ticker) {
  detailEditMode = !detailEditMode;
  const h = window.STW_DATA?.holdings?.find(x => x.ticker === ticker);
  if (h) renderDetail(h);
}

    `<div class="bullet-item">
      <span class="bullet-icon" style="color:${t.color}">◆</span>
      <span class="bullet-text">${b}</span>
    </div>`

  // Edit form (shown when detailEditMode is true)

    <div class="edit-form">
      <div class="edit-form-title">✎ Edit Position Fields</div>

        <div class="edit-row">
          <label class="edit-label">Conviction</label>

          </select>
        </div>

          </select>
        </div>
        <div class="edit-row">
          <label class="edit-label">Action Date</label>
          <input id="edit-action-date" type="date" class="edit-input" value="${h.action_date||''}">
        </div>
        <div class="edit-row">
          <label class="edit-label">Initial Weight %</label>
          <input id="edit-initial-weight" type="number" step="0.1" min="0" class="edit-input" value="${h.initial_weight!=null?h.initial_weight:''}" placeholder="—">
        </div>
        <div class="edit-row">
          <label class="edit-label">Current Weight %</label>
          <input id="edit-current-weight" type="number" step="0.1" min="0" class="edit-input" value="${h.current_weight!=null?h.current_weight:''}">
        </div>
        <div class="edit-row full">
          <label class="edit-label">Position Detail</label>

        <button class="edit-cancel" onclick="cancelEdit('${h.ticker}')">Cancel</button>

    </div>` : '';

  document.getElementById('detail-content').innerHTML = `

        </div>
      </div>
      <button class="edit-btn${detailEditMode?' active':''}" onclick="toggleEditMode('${h.ticker}')">✎ Edit</button>
    </div>

    ${editForm}

    <div class="detail-badges">
      ${basketTag(h.basket)}
      ${actionBadge(h.last_action)}
      <span class="tag" style="background:var(--s2);color:var(--t2);border:1px solid var(--bsub)">
        Rank #${String(h.rank).padStart(2,'0')} / ${window.STW_DATA.holdings.length}

    <div class="detail-meta-grid">
      <div class="meta-item">

        <div class="meta-value" style="color:${t.color}">${t.short}</div>

      <div style="display:flex;gap:20px;align-items:flex-start;flex-wrap:wrap">
        <div style="flex:1;min-width:120px">
          <div class="meta-label" style="font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--t3);margin-bottom:4px">Initial Entry</div>

      <h2>Graddox GEX Signals</h2>
      <p>Run the morning skill to pull today's SPX/QQQ levels, GEX analysis, and trade signal table.</p>
    </div>`;
    return;
  }

  // Date label
  const d = new Date(gx.date + 'T12:00:00');
  const dateStr = d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});

  // Bias chip
  const biasMap = {
    'flat-to-down': { cls:'flat-down', label:'⬇ Flat-to-Down' },
    'flat-to-up':   { cls:'bullish',   label:'↑ Flat-to-Up'   },
    'bullish':      { cls:'bullish',   label:'↑ Bullish'       },
    'bearish':      { cls:'bearish',   label:'↓ Bearish'       },
    'flat':         { cls:'flat',      label:'→ Flat'          },
  };
  const bm = biasMap[gx.bias] || { cls:'flat', label:gx.bias||'–' };

  // Updated time — skills write last_updated with proper ET offset (-04:00 EDT / -05:00 EST)
  // so new Date(s) parses it correctly without any manual slicing.
  const _gxD = gx.last_updated ? new Date(gx.last_updated) : null;
  const updStr = _gxD
    ? _gxD.toLocaleDateString('en-US',{month:'short',day:'numeric',...ET})
      + ' · ' + _gxD.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',...ET})
      + ' EST'
    : '–';

  // ── Level row renderer (shared by SPX + QQQ) ─────────────
  function buildLevelRows(levels, currentPrice, isQQQ, priceTime) {
    const rows = [
      levels.resistance   ? { icon:'🔴', price:levels.resistance,   label:'Resistance',        sub:'',              badge:null,    current:false } : null,
      levels.gex1         ? { icon:'🟡', price:levels.gex1,         label:'GEX1 / Gamma Flat', sub:'',              badge:null,    current:false } : null,
      levels.put_support  ? { icon:'🟢', price:levels.put_support,  label:'Put Support',        sub:(!isQQQ?'':levels.note||''), badge:null, current:false } : null,
      levels.key_target   ? { icon:'🎯', price:levels.key_target,   label:'Key Target',         sub:'',
                               badge:`<span class="gx-lvl-badge" style="background:#FFF7ED;color:#D97040;border:1px solid #FED7AA">Today's Target</span>`, current:false } : null,
      levels.downside_risk? { icon:'⚠️', price:levels.downside_risk,label:'Downside Risk',      sub:'',
                               badge:`<span class="gx-lvl-badge" style="background:#FEF2F2;color:#B91C1C;border:1px solid #FECACA">Downside Risk</span>`, current:false } : null,
      currentPrice        ? { icon:'💲', price:currentPrice,        label:'Current Price',      sub:priceTime||'',   badge:null,    current:true  } : null,
    ].filter(Boolean);

    // Sort high → low so resistance is at top and support at bottom
    rows.sort((a, b) => b.price - a.price);

    return rows.map(r => {
      const rowStyle = r.current ? 'background:#FEFCE8;' : '';
      const priceStyle = r.current ? 'color:#92400E;font-weight:700;' : '';
      const fmt = Number.isInteger(r.price) ? r.price.toString() : r.price.toFixed(2);
      return `
        <div class="gx-level-row" style="${rowStyle}">
          <span class="gx-lvl-icon">${r.icon}</span>
          <span class="gx-lvl-price" style="${priceStyle}">${fmt}</span>
          <span class="gx-lvl-label">${r.label}${r.sub?`<br><span style="font-size:10px;color:var(--t3)">${r.sub}</span>`:''}</span>
          ${r.badge||''}
        </div>`;
    }).join('');
  }

  // SPY levels (SPX ÷ 10)
  const spx = gx.spx || {};
  const spyLvl = {
    resistance:    spx.resistance    ? +(spx.resistance    / 10).toFixed(2) : null,
    gex1:          spx.gex1          ? +(spx.gex1          / 10).toFixed(2) : null,
    put_support:   spx.put_support   ? +(spx.put_support   / 10).toFixed(2) : null,
    key_target:    spx.key_target    ? +(spx.key_target    / 10).toFixed(2) : null,
    downside_risk: spx.downside_risk ? +(spx.downside_risk / 10).toFixed(2) : null,
  };
  const spyCurrentPrice = gx.spx_price ? +(gx.spx_price / 10).toFixed(2) : null;
  const priceTime = _gxD
    ? '@ ' + _gxD.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit', ...ET})
    : '';
  const SPX_ROWS = buildLevelRows(spyLvl, spyCurrentPrice, false, priceTime);

  // QQQ levels
  const qqq = gx.qqq || {};
  const QQQ_ROWS = buildLevelRows(qqq, gx.qqq_price || null, true, priceTime);

  // Signals table — grouped SPY first, then QQQ, then other
  const vcols = { green:'#16A34A', yellow:'#D97706', red:'#DC2626', gray:'#9CA3AF' };
  const vlbls = { green:'All ✓ — Enter', yellow:'Partial — Half size', red:'Skip', gray:'N/A' };
  function sigTicker(s) {
    const t = (s.trade + ' ' + s.trigger).toUpperCase();
    if (t.includes('QQQ')) return 'qqq';
    if (t.includes('SPY') || t.includes('SPX')) return 'spy';
    return 'other';
  }
  const sigsSorted = [...(gx.signals||[])].sort((a,b) => {
    const order = { spy:0, qqq:1, other:2 };
    return (order[sigTicker(a)]??2) - (order[sigTicker(b)]??2);
  });
  const SIG_ROWS = sigsSorted.map(s => {
    const vc = vcols[s.verdict]||vcols.gray;
    const vl = vlbls[s.verdict]||'N/A';
    const tk = sigTicker(s);
    return `<tr data-ticker="${tk}">
      <td><div class="gx-sig-trade">${s.trade}</div></td>
      <td style="color:var(--t2);font-size:11px">${s.trigger}</td>
      <td style="color:var(--t2);font-size:11px;white-space:nowrap">${s.exp}</td>
      <td><div class="gx-sig-logic">${s.logic}</div></td>
      <td><div class="gx-verdict"><span class="gx-vdot" style="background:${vc}"></span><span style="color:${vc}">${vl}</span></div></td>
    </tr>`;
  }).join('');

  // Day log
  const LOG_ITEMS = (gx.log||[]).map(m => `
    <div class="gx-log-item">
      <span class="gx-log-time">${m.time}</span>
      <span class="gx-log-text">${m.content}</span>
    </div>`).join('');

  document.getElementById('gx-subhdr-wrap').innerHTML = `
    <div class="gx-subhdr">
      <span class="gx-date">${dateStr}</span>
      <span class="gx-bias ${bm.cls}">${bm.label}</span>
      ${gx.bias_note ? `<span class="gx-bias-note">${gx.bias_note}</span>` : ''}
      <span class="gx-upd">Updated ${updStr}</span>
    </div>`;

  document.getElementById('gx-levels-wrap').innerHTML = `
    <div class="gx-card">
      <div class="gx-card-hdr">📊 SPY Levels</div>
      ${SPX_ROWS}
    </div>
    <div class="gx-card">
      <div class="gx-card-hdr">📊 QQQ Levels</div>
      ${QQQ_ROWS}
    </div>`;

  document.getElementById('gx-signals-wrap').innerHTML = `
    ${SIG_ROWS ? `
    <div class="gx-card">
      <div class="gx-card-hdr" style="padding:8px 13px;display:flex;align-items:center;gap:8px">
        <span>📋 Trade Signals</span>
        <div style="display:flex;gap:3px;margin-left:auto">
          <button class="tf-btn sig-filter-btn on" onclick="filterSignals('all',this)">All</button>
          <button class="tf-btn sig-filter-btn" onclick="filterSignals('spy',this)">SPY</button>
          <button class="tf-btn sig-filter-btn" onclick="filterSignals('qqq',this)">QQQ</button>
        </div>
      </div>
      <div class="gx-sig-wrap">
        <table class="gx-sig-table">
          <thead><tr>
            <th>Trade</th><th>Trigger</th><th>Exp</th><th>Logic (GEX)</th><th>Verdict</th>
          </tr></thead>
          <tbody id="sig-tbody">${SIG_ROWS}</tbody>
        </table>
      </div>
    </div>` : ''}
    <div class="gx-card">
      <div class="gx-card-hdr">📝 Day Log</div>
      ${LOG_ITEMS}
    </div>`;

  // Load charts after DOM is updated (async — doesn't block the rest of the UI)
  initCharts();
}

// ── Module switch ────────────────────────────────────────
function showModule(id, btn) {
  document.querySelectorAll('.module').forEach(m => m.classList.remove('on'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('on'));
  document.getElementById('mod-'+id).classList.add('on');
  btn.classList.add('on');
  localStorage.setItem('activeTab', id);
}

function restoreTab() {
  const saved = localStorage.getItem('activeTab');
  if (saved && saved !== 'stw') {
    const btn = document.querySelector(`.nav-btn[onclick*="'${saved}'"]`);
    if (btn) showModule(saved, btn);
  }
}

// ── Charts (Lightweight Charts + Finnhub) ────────────────
const FINNHUB_KEY = 'cuhkqs1r01qva71u3eugcuhkqs1r01qva71u3ev0';
let _lwCharts = {};
let _currentTF = '30m';

function switchTF(tf, btn) {
  document.querySelectorAll('#tf-btn-group .tf-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  _currentTF = tf;
  initCharts();
}

function filterSignals(ticker, btn) {
  document.querySelectorAll('.sig-filter-btn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  document.querySelectorAll('#sig-tbody tr[data-ticker]').forEach(tr => {
    tr.style.display = (ticker === 'all' || tr.dataset.ticker === ticker) ? '' : 'none';
  });
}

async function initCharts() {
  const tf = _currentTF || '30m';

  Object.values(_lwCharts).forEach(c => { try { c.remove(); } catch(e){} });
  _lwCharts = {};

  const now  = Math.floor(Date.now() / 1000);
  const day  = 86400;

  // Per-TF config: Finnhub resolution, lookback window, visible bars on load
  const TF = {
    '5m':  { res:'5',  from: now - 7*day,    visible: 80  },
    '15m': { res:'15', from: now - 30*day,   visible: 80  },
    '30m': { res:'30', from: now - 30*day,   visible: 70  },
    '1h':  { res:'60', from: now - 90*day,   visible: 50  },
    '4h':  { res:'60', from: now - 120*day,  visible: 40, agg4h: true },
    '1d':  { res:'D',  from: now - 730*day,  visible: 120 },
    '1W':  { res:'W',  from: now - 1825*day, visible: 104 },
  };
  const cfg = TF[tf] || TF['30m'];

  async function fetchBars(symbol) {
    const url = `https://finnhub.io/api/v1/stock/candle?symbol=${symbol}`
              + `&resolution=${cfg.res}&from=${cfg.from}&to=${now}&token=${FINNHUB_KEY}`;
    let data;
    try {
      const r = await fetch(url);
      data = await r.json();
    } catch(e) { return []; }

    if (data.s !== 'ok' || !data.t?.length) return [];

    let bars = data.t.map((t, i) => ({
      time:  data.t[i],
      open:  data.o[i],
      high:  data.h[i],
      low:   data.l[i],
      close: data.c[i],
    })).filter(b => b.open != null && b.close != null);

    // Aggregate 1h bars → 4h bars
    if (cfg.agg4h) {
      const chunks = [];
      for (let i = 0; i < bars.length; i += 4) {
        const g = bars.slice(i, i + 4);
        if (!g.length) break;
        chunks.push({
          time:  g[0].time,
          open:  g[0].open,
          high:  Math.max(...g.map(b => b.high)),
          low:   Math.min(...g.map(b => b.low)),
          close: g[g.length - 1].close,
        });
      }
      bars = chunks;
    }

    return bars;
  }

  function calcEMA(bars, period) {
    if (bars.length < 2) return [];
    const k = 2 / (period + 1);
    let ema = bars[0].close;
    return bars.map(b => {
      ema = b.close * k + ema * (1 - k);
      return { time: b.time, value: +ema.toFixed(4) };
    });
  }

  function buildChart(divId, bars, levels) {
    const el = document.getElementById(divId);
    if (!el) return null;
    el.innerHTML = '';

    if (!bars.length) {
      el.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#9CA3AF;font-size:12px">No data</div>';
      return null;
    }

    const showTime = !['1d','1W'].includes(tf);
    const chart = LightweightCharts.createChart(el, {
      autoSize: true,
      layout: { background: { type: 'solid', color: '#ffffff' }, textColor: '#78716C' },
      grid: {
        vertLines: { color: 'rgba(229,221,210,0.5)' },
        horzLines: { color: 'rgba(229,221,210,0.5)' },
      },
      rightPriceScale: { borderColor: '#E5DDD2' },
      timeScale: { borderColor: '#E5DDD2', timeVisible: showTime, secondsVisible: false },
      crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    });

    const candles = chart.addCandlestickSeries({
      upColor: '#22C55E', downColor: '#EF4444',
      borderUpColor: '#16A34A', borderDownColor: '#DC2626',
      wickUpColor: '#16A34A', wickDownColor: '#DC2626',
    });
    candles.setData(bars);

    // EMAs: 5 / 9 / 21 / 50
    [[5,'#22C55E'],[9,'#06B6D4'],[21,'#F97316'],[50,'#EF4444']].forEach(([period, color]) => {
      const emaData = calcEMA(bars, period);
      if (!emaData.length) return;
      chart.addLineSeries({
        color, lineWidth: 2,
        priceLineVisible: false, lastValueVisible: false, crosshairMarkerVisible: false,
      }).setData(emaData);
    });

    // GEX level lines
    if (levels) {
      [
        ['resistance',    '#EF4444', 'Resistance',    1],
        ['gex1',          '#D97706', 'GEX1',          1],
        ['put_support',   '#22C55E', 'Put Support',   1],
        ['key_target',    '#6366F1', 'Target',        2],
        ['downside_risk', '#F97316', 'Downside Risk', 2],
      ].forEach(([key, color, title, style]) => {
        if (!levels[key]) return;
        candles.createPriceLine({ price: levels[key], color, lineWidth: 1, lineStyle: style, axisLabelVisible: true, title });
      });
    }

    // Zoom to recent bars
    const total = bars.length;
    if (total > cfg.visible) {
      chart.timeScale().setVisibleLogicalRange({ from: total - cfg.visible - 0.5, to: total + 0.5 });
    } else {
      chart.timeScale().fitContent();
    }
    return chart;
  }

  // Loading placeholder
  ['chart-spy','chart-qqq'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#9CA3AF;font-size:12px">Loading…</div>';
  });

  const [spyBars, qqqBars] = await Promise.all([fetchBars('SPY'), fetchBars('QQQ')]);

  const gx = window.GRADDOX_DATA;
  const spyLevels = gx?.spx
    ? Object.fromEntries(Object.entries(gx.spx).map(([k, v]) => [k, v ? +(v / 10).toFixed(2) : null]))
    : null;
  const qqqLevels = gx?.qqq || null;

  _lwCharts.spy = buildChart('chart-spy', spyBars, spyLevels);
  _lwCharts.qqq = buildChart('chart-qqq', qqqBars, qqqLevels);
}

// ── Init ─────────────────────────────────────────────────
function renderAll() {
  const data = window.STW_DATA;
  if (!data) return;
  document.getElementById('hdr-meta').textContent = fmtUpdated(data.last_updated);
  populateFilters();
  filteredHoldings = [...data.holdings];
  document.getElementById('f-count').textContent = `${data.holdings.length} positions`;
  renderBasketBar();
  renderList();
  renderGraddox();
  restoreTab();
}

async function init() {
  const meta = document.getElementById('hdr-meta');
  const dot  = document.getElementById('db-dot');
  meta.textContent = 'Connecting…';
  dot.style.background = '#F59E0B';

  try {
    await dbFetch();
    dot.style.background = '#22C55E';
  } catch (e) {
    console.warn('Supabase unavailable, using embedded data:', e.message);
    dot.style.background = '#EF4444';
    dot.title = 'Offline — showing cached data';
  }

  renderAll();
}

// init() is called by the auth state listener after login — not on page load
