# STW subscriber web app. In Netlify set this site's base directory to "apps/web";
# Netlify reads this file from the base dir and runs the build there. pnpm walks up
# to the workspace root (pnpm-workspace.yaml) so the whole workspace installs.
[build]
  command = "pnpm install && pnpm --filter web build"
  publish = "dist"
  # Base dir is apps/web, so by default Netlify skips a build when only files OUTSIDE
  # it change — which silently dropped shared packages/** updates. Build when the app
  # dir, any shared package, or a root manifest changed; skip otherwise (e.g. docs).
  # (git diff --quiet exits 0 = no change → skip; non-zero → build.)
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- . ../../packages ../../pnpm-lock.yaml ../../package.json ../../pnpm-workspace.yaml"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

[functions."ibkr-flex"]
  timeout = 26

[functions."macro-recap-am"]
  timeout = 60

[functions."macro-recap-pm"]
  timeout = 60

[functions."macro-snapshot"]
  # Fetches ~10 TwelveData daily series, paced in ≤8-symbol chunks ~65s apart to
  # stay under the free tier's 8-credit/minute cap (an unpaced burst 429'd every
  # series past the 8th, which is why early snapshot rows had null trend/vol/credit
  # scores). The single ~65s inter-chunk sleep needs headroom past the old 60s cap.
  # See macro-snapshot.ts's pacedDailyCloses().
  timeout = 120

[functions."sector-map-sync"]
  # Resolves unmapped holdings tickers to GICS (a few Finnhub profile2 calls,
  # paced) and upserts ticker_sector_map. Usually 0 work; a modest timeout covers
  # the rare batch of newly-opened names.
  timeout = 30

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
