# STW admin dashboard. In Netlify set this site's base directory to "apps/admin";
# Netlify reads this file from the base dir and runs the build there. pnpm walks up
# to the workspace root (pnpm-workspace.yaml) so the whole workspace installs.
[build]
  command = "pnpm install && pnpm --filter admin build"
  publish = "dist"
  # Base dir is apps/admin, so by default Netlify skips a build when only files OUTSIDE
  # it change — which silently dropped shared packages/** updates. Build when the app
  # dir, any shared package, or a root manifest changed; skip otherwise (e.g. docs).
  # (git diff --quiet exits 0 = no change → skip; non-zero → build.)
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- . ../../packages ../../pnpm-lock.yaml ../../package.json ../../pnpm-workspace.yaml"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

[functions."regime-daily"]
  # Backfill mode (?backfill=1&days=N) does N days x 3 instruments of rolling-window
  # math on up to ~5000-bar series — give it real headroom, matching this repo's other
  # heavier scheduled functions (apps/web/netlify.toml's macro-recap-am/pm at 60s).
  timeout = 60

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
