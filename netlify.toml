[build]
  command = "cd mobile && npm ci && npm run build:web"
  publish = "mobile/dist"

[build.environment]
  EXPO_NO_TELEMETRY = "1"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[context.staging]
  command = "cd mobile && npm ci && npm run build:web"

[context.deploy-preview]
  command = "cd mobile && npm ci && npm run build:web"

[context.production]
  command = "echo 'Production deploys disabled'"
