# Mobile app — used by Netlify Site "STW Mobile"
# Admin app — Netlify Site "STW Admin" uses publish dir "admin", no build command

[build]
  command = "cd mobile && npm ci && npm run build:web"
  publish = "mobile/dist"

[build.environment]
  EXPO_NO_TELEMETRY = "1"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[context.mobile-main]
  command = "cd mobile && npm ci && npm run build:web"

[context.mobile-staging]
  command = "cd mobile && npm ci && npm run build:web"

[context.deploy-preview]
  command = "cd mobile && npm ci && npm run build:web"
